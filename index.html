const {useState,useEffect}=React;

// ✅ CONFIGURACIÓN DE FIREBASE (YA INCLUIDA)
const firebaseConfig={
apiKey:"AIzaSyBIzZog_VDpTbnrTpehVRTnMsi7TvmSgSY",
authDomain:"sistemazona268.firebaseapp.com",
projectId:"sistemazona268",
storageBucket:"sistemazona268.firebasestorage.app",
messagingSenderId:"108501130433",
appId:"1:108501130433:web:1d10ee28e7142169a18840"
};

let app,auth,db,storage;
let firebaseInitialized=false;

// Inicializar Firebase con reintentos
const initFirebase=async()=>{
if(firebaseInitialized)return true;
try{
if(!firebase.apps.length){
app=firebase.initializeApp(firebaseConfig);
}
auth=firebase.auth();
db=firebase.firestore();
storage=firebase.storage();
// Configurar persistencia
await auth.setPersistence(firebase.auth.Auth.Persistence.SESSION);	
firebaseInitialized=true;
return true;
}catch(error){
console.error("Error inicializando Firebase:",error);
return false;
}
};

// Inicializar Firebase inmediatamente
initFirebase();

const ADMIN_EMAIL='admin@sistema.local';
const MAX_LOGIN_RETRIES=3;
const RETRY_DELAY=2000;
const INACTIVIDAD_MS=10*60*1000;
let timerInactividad=null;

const resetTimer=()=>{
clearTimeout(timerInactividad);
timerInactividad=setTimeout(()=>{
auth.signOut();
alert('⏱️ Sesión cerrada por inactividad.');
},INACTIVIDAD_MS);
};

const iniciarMonitorInactividad=()=>{
['click','keydown','mousemove','touchstart'].forEach(ev=>window.addEventListener(ev,resetTimer));
resetTimer();
};

const detenerMonitorInactividad=()=>{
clearTimeout(timerInactividad);
['click','keydown','mousemove','touchstart'].forEach(ev=>window.removeEventListener(ev,resetTimer));
};

// Función de login con reintentos
const loginWithRetry=async(email,password,attempt=1)=>{
try{
await initFirebase();
const result=await auth.signInWithEmailAndPassword(email,password);
return{success:true,user:result.user};
}catch(error){
if(attempt<MAX_LOGIN_RETRIES&&(error.code==='auth/network-request-failed'||error.code==='auth/timeout')){
await new Promise(resolve=>setTimeout(resolve,RETRY_DELAY));
return loginWithRetry(email,password,attempt+1);
}
return{success:false,error:error.code,message:error.message,attempt};
}
};


const VisorExcel=({url})=>{
const[hojas,setHojas]=useState([]);
const[hojaActual,setHojaActual]=useState(0);
const[cargando,setCargando]=useState(true);
const[error,setError]=useState(false);
useEffect(()=>{
setCargando(true);setError(false);
const xhr=new XMLHttpRequest();
xhr.open('GET',url,true);
xhr.responseType='arraybuffer';
xhr.onload=()=>{
try{
const wb=XLSX.read(xhr.response,{type:'array'});
const resultado=wb.SheetNames.map(nombre=>{
const ws=wb.Sheets[nombre];
const html=XLSX.utils.sheet_to_html(ws,{editable:false});
return{nombre,html};
});
setHojas(resultado);setCargando(false);
}catch(e){setError(true);setCargando(false);}
};
xhr.onerror=()=>{setError(true);setCargando(false);};
xhr.send();
},[url]);
if(cargando)return React.createElement("div",{style:{display:"flex",alignItems:"center",justifyContent:"center",height:"70vh"}},React.createElement("div",{className:"spinner"}));
if(error)return(<div style={{textAlign:"center",padding:"2rem"}}><div style={{fontSize:"3rem",marginBottom:"1rem"}}>📊</div><p style={{color:"#6b7280",marginBottom:"1.5rem"}}>No se pudo previsualizar el archivo</p><a href={url} target="_blank" className="btn btn-primary" style={{textDecoration:"none"}}>⬇️ Descargar Excel</a></div>);
return(
<div style={{width:"100%",height:"70vh",display:"flex",flexDirection:"column"}}>
{hojas.length>1&&<div style={{display:"flex",gap:".5rem",padding:".5rem",background:"#f3f4f6",borderBottom:"1px solid #e5e7eb",overflowX:"auto"}}>
{hojas.map((h,i)=><button key={i} onClick={()=>setHojaActual(i)} style={{padding:".35rem .75rem",borderRadius:"6px",border:"none",background:hojaActual===i?"#2563eb":"#fff",color:hojaActual===i?"#fff":"#374151",fontWeight:"500",cursor:"pointer",fontSize:".8rem",whiteSpace:"nowrap"}}>{h.nombre}</button>)}
</div>}
<div style={{flex:1,overflow:"auto",padding:".5rem"}} dangerouslySetInnerHTML={{__html:`<style>table{border-collapse:collapse;width:100%;font-size:.8rem}td,th{border:1px solid #d1d5db;padding:.3rem .5rem;white-space:nowrap}</style>${hojas[hojaActual]?.html||""}`}}/>
</div>);
};
const App=()=>{
const[usuario,setUsuario]=useState(null);
const[esAdmin,setEsAdmin]=useState(false);
const[loading,setLoading]=useState(true);
const[vista,setVista]=useState('login');
const[config,setConfig]=useState({nombreZona:'',logoUrl:'',permitirBorradoEscuelas:false,cicloEscolar:''});
const[configCargada,setConfigCargada]=useState(false);
const[escuelas,setEscuelas]=useState([]);
const[programas,setProgramas]=useState([]);
const[documentos,setDocumentos]=useState([]);
const[compartidos,setCompartidos]=useState([]);
const[escuelaActual,setEscuelaActual]=useState(null);
const[error,setError]=useState(null);

useEffect(()=>{
let mounted=true;
const initAuth=async()=>{
await initFirebase();
try{const configSnap=await db.collection('configuracion').doc('general').get();if(configSnap.exists&&mounted){const c={nombreZona:'',logoUrl:'',permitirBorradoEscuelas:false,cicloEscolar:'',...configSnap.data()};setConfig(c);}setConfigCargada(true);}catch(e){setConfigCargada(true);}const unsubscribe=auth.onAuthStateChanged(async(user)=>{
if(!mounted)return;
if(user){
setUsuario(user);
const admin=user.email===ADMIN_EMAIL;
setEsAdmin(admin);
await cargarDatos(user,admin);
setVista(admin?'admin':'escuela');
iniciarMonitorInactividad();
}else{
setUsuario(null);
setVista('login');
detenerMonitorInactividad();
}
setLoading(false);
});
return unsubscribe;
};
const unsubscribePromise=initAuth();
return()=>{
mounted=false;
unsubscribePromise.then(unsub=>unsub&&unsub());
};
},[]); 

const cargarDatos=async(user,admin)=>{
try{
const configSnap=await db.collection('configuracion').doc('general').get();
if(configSnap.exists)setConfig({nombreZona:'',logoUrl:'',permitirBorradoEscuelas:false,...configSnap.data()});

const escuelasSnap=await db.collection('escuelas').orderBy('cct').get();
const escuelasData=escuelasSnap.docs.map(d=>({id:d.id,...d.data()}));
setEscuelas(escuelasData);

if(!admin){
const escuela=escuelasData.find(e=>`${e.cct.toLowerCase()}@escuela.local`===user.email);
setEscuelaActual(escuela);
}

const programasSnap=await db.collection('programas').orderBy('fechaLimite','desc').get();
setProgramas(programasSnap.docs.map(d=>({id:d.id,...d.data()})));

const docsSnap=await db.collection('documentos').get();
setDocumentos(docsSnap.docs.map(d=>({id:d.id,...d.data()})));

const compSnap=await db.collection('compartidos').get();
setCompartidos(compSnap.docs.map(d=>({id:d.id,...d.data()})));
}catch(error){
console.error('Error cargando:',error);
setError('Error al cargar datos. Verifica tu conexión.');
}
};

if(loading)return <Loading/>;
if(error)return <Error mensaje={error}/>;

return(
<>
{vista==='login'&&<Login config={config} escuelas={escuelas} configCargada={configCargada}/>}
{vista==='admin'&&<Admin usuario={usuario} config={config} setConfig={setConfig} escuelas={escuelas} setEscuelas={setEscuelas} programas={programas} setProgramas={setProgramas} documentos={documentos} setDocumentos={setDocumentos} compartidos={compartidos} setCompartidos={setCompartidos} onLogout={()=>auth.signOut()}/>}
{vista==='escuela'&&<Escuela usuario={usuario} escuela={escuelaActual} config={config} programas={programas} documentos={documentos} setDocumentos={setDocumentos} compartidos={compartidos} onLogout={()=>auth.signOut()}/>}
</>
);
};

const Login=({config,escuelas,configCargada})=>{
const[cct,setCct]=useState('');
const[password,setPassword]=useState('');
const[modoAdmin,setModoAdmin]=useState(false);
const[error,setError]=useState('');
const[cargando,setCargando]=useState(false);
const[intento,setIntento]=useState(0);
const[conectando,setConectando]=useState(false);

const handleLogin=async(e)=>{
e?.preventDefault();
setError('');
setCargando(true);
setConectando(true);
setIntento(1);

try{
let email;
if(modoAdmin){
email=ADMIN_EMAIL;
}else{
if(!cct){
setError('Ingresa tu CCT');
setCargando(false);
setConectando(false);
return;
}
const escuelasSnap=await db.collection('escuelas').where('cct','==',cct.toUpperCase()).limit(1).get();
if(escuelasSnap.empty){
setError('CCT no encontrado. Verifica que esté registrado en el sistema.');
setCargando(false);
setConectando(false);
return;
}
const escuela=escuelasSnap.docs[0].data();
email=`${escuela.cct.toLowerCase()}@escuela.local`;
}

// Intentar login con reintentos
const result=await loginWithRetry(email,password);

if(result.success){
setConectando(false);
// Login exitoso
}else{
setConectando(false);
setCargando(false);
if(result.error==='auth/wrong-password'||result.error==='auth/user-not-found'){
setError('CCT o contraseña incorrectos');
}else if(result.error==='auth/network-request-failed'){
setError('Error de conexión. Verifica tu internet e intenta de nuevo.');
}else if(result.error==='auth/too-many-requests'){
setError('Demasiados intentos. Espera un momento e intenta de nuevo.');
}else{
setError('Error al iniciar sesión. Intenta de nuevo.');
}
console.error('Error login:',result);
}
}catch(err){
setConectando(false);
setCargando(false);
setError('Error inesperado. Intenta de nuevo.');
console.error('Error login:',err);
}
};

if(!configCargada)return(<div style={{minHeight:'100vh',background:'linear-gradient(135deg,#667eea 0%,#764ba2 100%)',display:'flex',alignItems:'center',justifyContent:'center'}}><div style={{width:'40px',height:'40px',border:'4px solid white',borderTop:'4px solid transparent',borderRadius:'50%',animation:'spin 1s linear infinite'}}/></div>);

<div style={{minHeight:'100vh',background:'linear-gradient(135deg,#667eea 0%,#764ba2 100%)',display:'flex',alignItems:'center',justifyContent:'center',padding:'1rem'}}>

<button onClick={()=>setModoAdmin(true)} disabled={cargando} style={{flex:1,padding:'.65rem',borderRadius:'6px',border:'none',fontWeight:'500',cursor:cargando?'not-allowed':'pointer',background:modoAdmin?'white':'transparent',color:modoAdmin?'#2563eb':'#6b7280',boxShadow:modoAdmin?'0 1px 3px rgba(0,0,0,.1)':'none'}}>Administrador</button>
</div>

{conectando&&<div style={{padding:'.75rem',background:'#dbeafe',border:'1px solid #93c5fd',borderRadius:'8px',color:'#1e40af',fontSize:'.875rem',marginBottom:'1rem',textAlign:'center'}} className="pulse">🔄 Conectando con servidor... {intento>0&&`(intento ${intento}/${MAX_LOGIN_RETRIES})`}</div>}
<form onSubmit={handleLogin}>

<div style={{marginBottom:'1.5rem'}}><label>Contraseña</label><input type="password" value={password} onChange={(e)=>setPassword(e.target.value)} placeholder="••••••••" required disabled={cargando}/></div>

{cargando?(

<div style={{width:'16px',height:'16px',border:'2px solid white',borderTop:'2px solid transparent',borderRadius:'50%',animation:'spin 1s linear infinite'}}/>
{conectando?'Conectando...':'Ingresando...'}
</span>
):'Ingresar'}
</button>
</form>
<div style={{marginTop:'1rem',padding:'.75rem',background:'#f9fafb',borderRadius:'8px',fontSize:'.75rem',color:'#6b7280',textAlign:'center'}}>
<p>💡 Si el sistema tarda en conectar, es normal. Por favor espera.</p>
</div>
</div>
</div>
);
};

const Escuela=({usuario,escuela,config,programas,documentos,setDocumentos,compartidos,onLogout})=>{

const compEscuela=compartidos.filter(c=>!c.programaId||progEscuela.some(p=>p.id===c.programaId));
const pendientes=progEscuela.flatMap(p=>{const docs=documentos.filter(d=>d.escuelaId===escuela.id&&d.programaId===p.id);const faltantes=p.documentosRequeridos.filter(d=>!docs.find(doc=>doc.nombreDocumento===d));return faltantes.length>0?[{programa:p.nombre,fechaLimite:p.fechaLimite,docs:faltantes}]:[];});
const seleccionarArchivo=(e,programa,doc)=>{
const file=e.target.files[0];
if(!file)return;
if(file.size>3*1024*1024){alert('❌ El archivo supera 3 MB.');e.target.value='';return;}
const previstaUrl=file.type.startsWith('image/')?URL.createObjectURL(file):null;
setPrevia({file,programa,doc,previstaUrl,nombre:file.name,tipo:getTipo(file)});
};
const confirmarSubida=async()=>{
if(!previa)return;
const{file,programa,doc}=previa;
setSubiendo(true);setProgreso(0);
try{
const ref=storage.ref('docs/'+escuela.cct+'/'+programa.nombre+'/'+Date.now()+'_'+file.name);
const task=ref.put(file);
task.on('state_changed',(snap)=>setProgreso(Math.round((snap.bytesTransferred/snap.totalBytes)*100)));
await task;
const url=await ref.getDownloadURL();
const data={escuelaId:escuela.id,programaId:programa.id,nombreDocumento:doc,nombreArchivo:file.name,url,tipo:getTipo(file),fecha:new Date().toISOString(),por:escuela.nombre};
const docRef=await db.collection('documentos').add(data);
setDocumentos([...documentos,{id:docRef.id,...data}]);
setPrevia(null);
alert('✅ Archivo subido correctamente');
}catch(error){console.error(error);alert('❌ Error al subir archivo.');}
finally{setSubiendo(false);setProgreso(0);}
};

if(doc.url){const ref=storage.refFromURL(doc.url);await ref.delete().catch(()=>{});}
await db.collection('documentos').doc(docId).delete();
setDocumentos(documentos.filter(d=>d.id!==docId));
setModalBorrar(null);
alert('✅ Archivo eliminado');
}catch(error){console.error(error);alert('❌ Error al eliminar');}
};

const importarExcel=async(e)=>{
const file=e.target.files[0];
if(!file)return;
const data=await file.arrayBuffer();
const wb=XLSX.read(data);
const ws=wb.Sheets[wb.SheetNames[0]];
const rows=XLSX.utils.sheet_to_json(ws);
if(!confirm(`¿Importar ${rows.length} escuelas? Esto reemplazará las escuelas existentes.`))return;
const snap=await db.collection('escuelas').get();
for(const d of snap.docs)await d.ref.delete();
const nuevas=[];
for(const row of rows){
const keys=Object.keys(row).map(k=>k.toLowerCase());
const get=(terminos)=>{const k=Object.keys(row).find(k=>terminos.some(t=>k.toLowerCase().includes(t)));return k?String(row[k]||'').trim():'';}
const escuela={nombre:get(['escuela','nombre']),cct:get(['clave','cct']).toUpperCase(),comunidad:get(['localidad','comunidad']),director:get(['director'])};
if(!escuela.nombre||!escuela.cct)continue;
const ref=await db.collection('escuelas').add(escuela);
nuevas.push({id:ref.id,...escuela});
}
setEscuelas(nuevas);
alert(`✅ ${nuevas.length} escuelas importadas correctamente`);
e.target.value='';
};

onClose();

}catch(error){

const calcStats=(escuelas,programas,documentos)=>{
const total=escuelas.length;
let completas=0,pendientes=0;
escuelas.forEach(e=>{
const progs=programas.filter(p=>p.todasEscuelas||(p.escuelasAsignadas||[]).includes(e.id));
let req=0,ent=0;
progs.forEach(p=>{p.documentosRequeridos.forEach(d=>{req++;if(documentos.find(doc=>doc.escuelaId===e.id&&doc.programaId===p.id&&doc.nombreDocumento===d))ent++;});});
if(req>0&&ent===req)completas++;
pendientes+=(req-ent);
});
return{total,completas,pendientes,avance:total>0?Math.round((completas/total)*100):0};
};

const getTipo=(file)=>{
const ext=file.name.split('.').pop().toLowerCase();
if(ext==='pdf')return'PDF';
if(['xlsx','xls'].includes(ext))return'Excel';
if(['docx','doc'].includes(ext))return'Word';
if(['jpg','jpeg','png'].includes(ext))return'Imagen';
return'Otro';
};

const saveEscuela=async(data,escuelas,setEscuelas,onClose)=>{
try{
if(data.id){
await db.collection('escuelas').doc(data.id).update(data);
setEscuelas(escuelas.map(e=>e.id===data.id?data:e));
}else{
const ref=await db.collection('escuelas').add(data);
setEscuelas([...escuelas,{id:ref.id,...data}]);
}
onClose();
}catch(error){
console.error(error);
alert('Error al guardar');
}
};

const savePrograma=async(data,programas,setProgramas,onClose)=>{
try{
if(data.id){
await db.collection('programas').doc(data.id).update(data);
setProgramas(programas.map(p=>p.id===data.id?data:p));
}else{
const ref=await db.collection('programas').add(data);
setProgramas([...programas,{id:ref.id,...data}]);
}
onClose();
}catch(error){
console.error(error);
alert('Error al guardar');
}
};

const saveConfig=async(data,setConfig)=>{
try{
await db.collection('configuracion').doc('general').set(data,{merge:true});
setConfig(data);
alert('✅ Configuración guardada');
}catch(error){

alert('Error al guardar');
}
};

const saveCompartido=async(data,compartidos,setCompartidos,onClose)=>{
try{
const ref=await db.collection('compartidos').add(data);
setCompartidos([...compartidos,{id:ref.id,...data}]);
onClose();
}catch(error){
console.error(error);
alert('Error al guardar');
}
};

const delEscuela=async(id,escuelas,setEscuelas,documentos,setDocumentos)=>{
if(!confirm('¿Eliminar esta escuela? Se perderán todos sus documentos.'))return;
try{
const docsEscuela=documentos.filter(d=>d.escuelaId===id);
for(const doc of docsEscuela){if(doc.url){try{await storage.refFromURL(doc.url).delete();}catch(e){}}await db.collection('documentos').doc(doc.id).delete();}
await db.collection('escuelas').doc(id).delete();
setDocumentos(documentos.filter(d=>d.escuelaId!==id));
setEscuelas(escuelas.filter(e=>e.id!==id));
}catch(error){
console.error(error);
alert('Error al eliminar');
}
};
const delPrograma=async(id,programas,setProgramas,documentos,setDocumentos)=>{
if(!confirm('¿Eliminar este programa?'))return;
try{
const docsPrograma=documentos.filter(d=>d.programaId===id);
for(const doc of docsPrograma){if(doc.url){try{await storage.refFromURL(doc.url).delete();}catch(e){}}await db.collection('documentos').doc(doc.id).delete();}
await db.collection('programas').doc(id).delete();
setDocumentos(documentos.filter(d=>d.programaId!==id));
setProgramas(programas.filter(p=>p.id!==id));
}catch(error){console.error(error);
alert('Error al eliminar');
}
};

const delDocumento=async(id,documentos,setDocumentos)=>{
if(!confirm('¿Eliminar este documento?'))return;
try{
const doc=documentos.find(d=>d.id===id);
if(doc.url){
const ref=storage.refFromURL(doc.url);
await ref.delete().catch(()=>{});
}
await db.collection('documentos').doc(id).delete();
setDocumentos(documentos.filter(d=>d.id!==id));
alert('✅ Documento eliminado');
}catch(error){
console.error(error);
alert('❌ Error al eliminar');
}
};

const delCompartido=async(id,compartidos,setCompartidos)=>{
if(!confirm('¿Eliminar este archivo?'))return;
try{
const doc=compartidos.find(c=>c.id===id);
if(doc.url){
const ref=storage.refFromURL(doc.url);
await ref.delete().catch(()=>{});
}
await db.collection('compartidos').doc(id).delete();
setCompartidos(compartidos.filter(c=>c.id!==id));
}catch(error){
console.error(error);
alert('Error al eliminar');
}
};

const exportExcel=(escuelas,programas,documentos)=>{
let csv='Escuela,CCT,Comunidad,Director,Programas,Entregados,Total,Avance\n';
escuelas.forEach(e=>{
const progs=programas.filter(p=>p.todasEscuelas||(p.escuelasAsignadas||[]).includes(e.id));
let total=0,ent=0;
progs.forEach(p=>{p.documentosRequeridos.forEach(d=>{total++;if(documentos.find(doc=>doc.escuelaId===e.id&&doc.programaId===p.id&&doc.nombreDocumento===d))ent++;});});
const pct=total>0?Math.round((ent/total)*100):0;
csv+=`"${e.nombre}","${e.cct}","${e.comunidad}","${e.director}",${progs.length},${ent},${total},${pct}%\n`;
});
const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
const url=URL.createObjectURL(blob);
const a=document.createElement('a');
a.href=url;
a.download=`reporte_${new Date().toISOString().split('T')[0]}.csv`;
a.click();
};

root.render(<App/>);
</script>

<script>
// Detectar móvil
const esCelular=()=>window.innerWidth<=768||/Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

if(esCelular()){
  document.getElementById('mobile-root').style.display='block';

  // Esperar a que React cargue los datos
  const esperarDatos=setInterval(()=>{
    // Acceder a datos de Firebase directamente
    if(typeof firebase!=='undefined'&&firebase.apps.length){
      clearInterval(esperarDatos);
      iniciarMovil();
    }
  },500);
}

async function iniciarMovil(){
  const auth=firebase.auth();
  const db=firebase.firestore();
  const storage=firebase.storage();
  const ADMIN_EMAIL='admin@sistema.local';

  let estado={
    usuario:null,esAdmin:false,
    config:{nombreZona:'',logoUrl:'',cicloEscolar:''},
    escuelas:[],programas:[],documentos:[],compartidos:[],
    tab:'dashboard',
    filtroEsc:'',filtroProg:'',
    modal:null,modalData:null
  };

  const root=document.getElementById('mobile-root');

  auth.onAuthStateChanged(async user=>{
    if(!user){renderLogin();return;}
    estado.usuario=user;
    estado.esAdmin=user.email===ADMIN_EMAIL;
  if(!estado.esAdmin){document.getElementById('mobile-root').style.display='none';document.getElementById('root').style.display='block';return;}
    await cargarDatos();
    document.getElementById('root').style.display='none';
    renderAdmin();
  });

  async function cargarDatos(){
    try{
      const[cfgSnap,escSnap,progSnap,docSnap,compSnap]=await Promise.all([
        db.collection('configuracion').doc('general').get(),
        db.collection('escuelas').orderBy('cct').get(),
        db.collection('programas').orderBy('fechaLimite','desc').get(),
        db.collection('documentos').get(),
        db.collection('compartidos').get()
      ]);
      if(cfgSnap.exists)estado.config={...estado.config,...cfgSnap.data()};
      estado.escuelas=escSnap.docs.map(d=>({id:d.id,...d.data()}));
      estado.programas=progSnap.docs.map(d=>({id:d.id,...d.data()}));
      estado.documentos=docSnap.docs.map(d=>({id:d.id,...d.data()}));
      estado.compartidos=compSnap.docs.map(d=>({id:d.id,...d.data()}));
    }catch(e){console.error(e);}
  }

  function calcStats(){
    const{escuelas,programas,documentos}=estado;
    let completas=0,pendientes=0;
    escuelas.forEach(e=>{
      const progs=programas.filter(p=>p.todasEscuelas||(p.escuelasAsignadas||[]).includes(e.id));
      let req=0,ent=0;
      progs.forEach(p=>{p.documentosRequeridos.forEach(d=>{req++;if(documentos.find(doc=>doc.escuelaId===e.id&&doc.programaId===p.id&&doc.nombreDocumento===d))ent++;});});
      if(req>0&&ent===req)completas++;
      pendientes+=(req-ent);
    });
    return{total:escuelas.length,completas,pendientes,avance:escuelas.length>0?Math.round((completas/escuelas.length)*100):0};
  }

  function getIniciales(nombre){return nombre.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();}
  function getColor(i){const c=[['#dbeafe','#1d4ed8'],['#d1fae5','#059669'],['#fef3c7','#d97706'],['#ede9fe','#7c3aed'],['#fee2e2','#dc2626']];return c[i%c.length];}
  function getPct(escuela){
    const progs=estado.programas.filter(p=>p.todasEscuelas||(p.escuelasAsignadas||[]).includes(escuela.id));
    let req=0,ent=0;
    progs.forEach(p=>{p.documentosRequeridos.forEach(d=>{req++;if(estado.documentos.find(doc=>doc.escuelaId===escuela.id&&doc.programaId===p.id&&doc.nombreDocumento===d))ent++;});});
    return req>0?Math.round((ent/req)*100):0;
  }
  function getPctColor(p){return p>=75?'#10b981':p>=50?'#f59e0b':'#ef4444';}
  function getDocIco(tipo){
    if(tipo==='PDF')return['#fee2e2','#dc2626','PDF'];
    if(tipo==='Word')return['#dbeafe','#2563eb','DOC'];
    if(tipo==='Excel')return['#d1fae5','#059669','XLS'];
    if(tipo==='Imagen')return['#fef3c7','#d97706','IMG'];
    return['#f1f5f9','#64748b','FILE'];
  }
  function fmtFecha(iso){if(!iso)return'';return new Date(iso).toLocaleDateString('es-MX',{day:'2-digit',month:'2-digit',year:'2-digit'});}

  function renderLogin(modo='escuela'){
    root.innerHTML=`<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;background:linear-gradient(135deg,#667eea,#764ba2)">
    <div style="background:#fff;border-radius:16px;padding:2rem;width:100%;max-width:360px">

      <button id="m-tab-adm" onclick="renderLogin('admin')" style="flex:1;padding:.6rem;border-radius:8px;border:none;font-weight:600;font-size:.875rem;cursor:pointer;font-family:inherit;background:${modo==='admin'?'#fff':'transparent'};color:${modo==='admin'?'#2563eb':'#94a3b8'};box-shadow:${modo==='admin'?'0 1px 3px rgba(0,0,0,.1)':'none'}">Administrador</button>
    </div>

    ${modo==='escuela'?'<input id="m-cct" type="text" placeholder="CCT de tu escuela (30EPR0000A)" style="width:100%;padding:.75rem;border:1px solid #e2e8f0;border-radius:8px;font-size:.95rem;margin-bottom:.75rem;font-family:inherit;text-transform:uppercase">':''} 
    <input id="m-pwd" type="password" placeholder="Contraseña" style="width:100%;padding:.75rem;border:1px solid #e2e8f0;border-radius:8px;font-size:.95rem;margin-bottom:1rem;font-family:inherit">
    <button onclick="mLogin('${modo}')" style="width:100%;padding:.75rem;border-radius:8px;border:none;background:#2563eb;color:#fff;font-weight:600;font-size:1rem;cursor:pointer;font-family:inherit">Ingresar</button>
    <div style="margin-top:1rem;padding:.75rem;background:#f9fafb;border-radius:8px;font-size:.72rem;color:#94a3b8;text-align:center">💡 Si el sistema tarda en conectar, por favor espera.</div>
    </div></div>`;
    window.mLogin=async(modo)=>{
      const pwd=document.getElementById('m-pwd').value;
      const err=document.getElementById('m-login-err');
      err.style.display='none';
      try{
        if(modo==='admin'){
          await auth.signInWithEmailAndPassword(ADMIN_EMAIL,pwd);
        }else{
          const cct=document.getElementById('m-cct').value.trim().toUpperCase();
          if(!cct){err.style.display='block';err.textContent='Ingresa tu CCT';return;}
          const snap=await db.collection('escuelas').where('cct','==',cct).limit(1).get();
          if(snap.empty){err.style.display='block';err.textContent='CCT no encontrado en el sistema';return;}
          const email=`${cct.toLowerCase()}@escuela.local`;
          await auth.signInWithEmailAndPassword(email,pwd);
        }
      }catch(e){
        err.style.display='block';
        err.textContent=e.code==='auth/wrong-password'||e.code==='auth/user-not-found'?'CCT o contraseña incorrectos':'Error de conexión. Intenta de nuevo.';
      }
    };
  }

            return`<div style="display:flex;align-items:center;justify-content:space-between;padding:.5rem .6rem;border-radius:8px;background:${docSub?'#f0fdf4':'#fff9f9'};border:1px solid ${docSub?'#bbf7d0':'#fecaca'};margin-bottom:.35rem">

  window.mBorrarDocDetalle=async(docId,escId)=>{
    if(!confirm('¿Eliminar este documento?'))return;
    try{
      const doc=estado.documentos.find(d=>d.id===docId);
      if(doc?.url){try{await storage.refFromURL(doc.url).delete();}catch(e){}}
      await db.collection('documentos').doc(docId).delete();
      estado.documentos=estado.documentos.filter(d=>d.id!==docId);
      mVerEscuela(escId);
    }catch(e){alert('Error al eliminar');}
  };

      <div class="m-section">Configuración</div>
      <div style="margin-bottom:1rem"><label style="font-size:.8rem;font-weight:600;display:block;margin-bottom:.4rem">Nombre de la Zona</label>
      <input id="m-cfg-nombre" value="${config.nombreZona||''}" style="width:100%;padding:.65rem;border:1px solid #e2e8f0;border-radius:8px;font-family:inherit;font-size:.9rem"></div>
      <div style="margin-bottom:1.5rem"><label style="font-size:.8rem;font-weight:600;display:block;margin-bottom:.4rem">Ciclo Escolar</label>
      <input id="m-cfg-ciclo" value="${config.cicloEscolar||''}" placeholder="2025-2026" style="width:100%;padding:.65rem;border:1px solid #e2e8f0;border-radius:8px;font-family:inherit;font-size:.9rem"></div>
      <button onclick="mGuardarConfig()" class="m-action-btn m-btn-p" style="width:100%">Guardar</button>
    </div>`;
  }

  // Acciones
  window.mFiltroEsc=id=>{estado.filtroEsc=id;renderTab();}
  window.mFiltroProg=id=>{estado.filtroProg=id;renderTab();}

  window.mBorrarDoc=async id=>{
    if(!confirm('¿Eliminar este documento?'))return;
    try{
      const doc=estado.documentos.find(d=>d.id===id);
      if(doc?.url){try{await storage.refFromURL(doc.url).delete();}catch(e){}}
      await db.collection('documentos').doc(id).delete();
      estado.documentos=estado.documentos.filter(d=>d.id!==id);
      renderTab();
    }catch(e){alert('Error al eliminar');}
  };

  window.mBorrarEscuela=async id=>{
    if(!confirm('¿Eliminar esta escuela y todos sus documentos?'))return;
    try{
      const docs=estado.documentos.filter(d=>d.escuelaId===id);
      for(const d of docs){if(d.url){try{await storage.refFromURL(d.url).delete();}catch(e){}}await db.collection('documentos').doc(d.id).delete();}
      await db.collection('escuelas').doc(id).delete();
      estado.escuelas=estado.escuelas.filter(e=>e.id!==id);
      estado.documentos=estado.documentos.filter(d=>d.escuelaId!==id);
      renderTab();
    }catch(e){alert('Error al eliminar');}
  };

  window.mBorrarPrograma=async id=>{
    if(!confirm('¿Eliminar este programa?'))return;
    try{
      const docs=estado.documentos.filter(d=>d.programaId===id);
      for(const d of docs){if(d.url){try{await storage.refFromURL(d.url).delete();}catch(e){}}await db.collection('documentos').doc(d.id).delete();}
      await db.collection('programas').doc(id).delete();
      estado.programas=estado.programas.filter(p=>p.id!==id);
      estado.documentos=estado.documentos.filter(d=>d.programaId!==id);
      renderTab();
    }catch(e){alert('Error al eliminar');}
  };

  window.mBorrarCompartido=async id=>{
    if(!confirm('¿Eliminar este archivo?'))return;
    try{
      const c=estado.compartidos.find(x=>x.id===id);
      if(c?.url){try{await storage.refFromURL(c.url).delete();}catch(e){}}
      await db.collection('compartidos').doc(id).delete();
      estado.compartidos=estado.compartidos.filter(x=>x.id!==id);
      renderTab();
    }catch(e){alert('Error al eliminar');}
  };

  window.mGuardarConfig=async()=>{
    const nombre=document.getElementById('m-cfg-nombre').value;
    const ciclo=document.getElementById('m-cfg-ciclo').value;
    try{
      await db.collection('configuracion').doc('general').set({...estado.config,nombreZona:nombre,cicloEscolar:ciclo},{merge:true});
      estado.config={...estado.config,nombreZona:nombre,cicloEscolar:ciclo};
      alert('✅ Guardado');renderAdmin();
    }catch(e){alert('Error al guardar');}
  };

  window.mNuevaEscuela=()=>{
    const form=`<div class="m-card"><div class="m-section">Nueva Escuela</div>
    <div style="margin-bottom:.75rem"><label style="font-size:.8rem;font-weight:600;display:block;margin-bottom:.3rem">Nombre *</label><input id="mf-nombre" style="width:100%;padding:.65rem;border:1px solid #e2e8f0;border-radius:8px;font-family:inherit"></div>
    <div style="margin-bottom:.75rem"><label style="font-size:.8rem;font-weight:600;display:block;margin-bottom:.3rem">CCT *</label><input id="mf-cct" style="width:100%;padding:.65rem;border:1px solid #e2e8f0;border-radius:8px;font-family:inherit;text-transform:uppercase"></div>
    <div style="margin-bottom:.75rem"><label style="font-size:.8rem;font-weight:600;display:block;margin-bottom:.3rem">Comunidad</label><input id="mf-com" style="width:100%;padding:.65rem;border:1px solid #e2e8f0;border-radius:8px;font-family:inherit"></div>
    <div style="margin-bottom:1rem"><label style="font-size:.8rem;font-weight:600;display:block;margin-bottom:.3rem">Director</label><input id="mf-dir" style="width:100%;padding:.65rem;border:1px solid #e2e8f0;border-radius:8px;font-family:inherit"></div>
    <div style="display:flex;gap:.5rem">
      <button onclick="mTab('escuelas')" class="m-action-btn" style="background:#f1f5f9;color:#374151">Cancelar</button>
      <button onclick="mGuardarEscuela()" class="m-action-btn m-btn-p">Guardar</button>
    </div></div>`;
    document.getElementById('m-content').innerHTML=form;
  };

  window.mGuardarEscuela=async()=>{
    const nombre=document.getElementById('mf-nombre').value.trim();
    const cct=document.getElementById('mf-cct').value.trim().toUpperCase();
    if(!nombre||!cct){alert('Nombre y CCT son requeridos');return;}
    const data={nombre,cct,comunidad:document.getElementById('mf-com').value.trim(),director:document.getElementById('mf-dir').value.trim()};
    try{const ref=await db.collection('escuelas').add(data);estado.escuelas.push({id:ref.id,...data});mTab('escuelas');}
    catch(e){alert('Error al guardar');}
  };

  window.mEditarEscuela=id=>{
    const e=estado.escuelas.find(x=>x.id===id);
    if(!e)return;
    const form=`<div class="m-card"><div class="m-section">Editar Escuela</div>
    <div style="margin-bottom:.75rem"><label style="font-size:.8rem;font-weight:600;display:block;margin-bottom:.3rem">Nombre *</label><input id="mf-nombre" value="${e.nombre}" style="width:100%;padding:.65rem;border:1px solid #e2e8f0;border-radius:8px;font-family:inherit"></div>
    <div style="margin-bottom:.75rem"><label style="font-size:.8rem;font-weight:600;display:block;margin-bottom:.3rem">CCT *</label><input id="mf-cct" value="${e.cct}" style="width:100%;padding:.65rem;border:1px solid #e2e8f0;border-radius:8px;font-family:inherit;text-transform:uppercase"></div>
    <div style="margin-bottom:.75rem"><label style="font-size:.8rem;font-weight:600;display:block;margin-bottom:.3rem">Comunidad</label><input id="mf-com" value="${e.comunidad||''}" style="width:100%;padding:.65rem;border:1px solid #e2e8f0;border-radius:8px;font-family:inherit"></div>
    <div style="margin-bottom:1rem"><label style="font-size:.8rem;font-weight:600;display:block;margin-bottom:.3rem">Director</label><input id="mf-dir" value="${e.director||''}" style="width:100%;padding:.65rem;border:1px solid #e2e8f0;border-radius:8px;font-family:inherit"></div>
    <div style="display:flex;gap:.5rem">
      <button onclick="mTab('escuelas')" class="m-action-btn" style="background:#f1f5f9;color:#374151">Cancelar</button>
      <button onclick="mActualizarEscuela('${id}')" class="m-action-btn m-btn-p">Guardar</button>
    </div></div>`;
    document.getElementById('m-content').innerHTML=form;
  };

  window.mActualizarEscuela=async id=>{
    const nombre=document.getElementById('mf-nombre').value.trim();
    const cct=document.getElementById('mf-cct').value.trim().toUpperCase();
    if(!nombre||!cct){alert('Nombre y CCT son requeridos');return;}
    const data={nombre,cct,comunidad:document.getElementById('mf-com').value.trim(),director:document.getElementById('mf-dir').value.trim(),id};
    try{await db.collection('escuelas').doc(id).update(data);estado.escuelas=estado.escuelas.map(e=>e.id===id?data:e);mTab('escuelas');}
    catch(e){alert('Error al guardar');}
  };

  window.mPassword=id=>{
    const e=estado.escuelas.find(x=>x.id===id);
    if(!e)return;
    const email=`${e.cct.toLowerCase()}@escuela.local`;
    const form=`<div class="m-card"><div class="m-section">Asignar Contraseña</div>
    <div style="padding:.75rem;background:#dbeafe;border-radius:8px;font-size:.8rem;margin-bottom:1rem">
      <strong>${e.nombre}</strong><br>${e.cct}<br>${email}
    </div>
    <div style="margin-bottom:.75rem"><label style="font-size:.8rem;font-weight:600;display:block;margin-bottom:.3rem">Nueva Contraseña</label><input id="mf-pwd" type="password" style="width:100%;padding:.65rem;border:1px solid #e2e8f0;border-radius:8px;font-family:inherit" minlength="6"></div>
    <div style="margin-bottom:1rem"><label style="font-size:.8rem;font-weight:600;display:block;margin-bottom:.3rem">Confirmar</label><input id="mf-pwd2" type="password" style="width:100%;padding:.65rem;border:1px solid #e2e8f0;border-radius:8px;font-family:inherit" minlength="6"></div>
    <div style="display:flex;gap:.5rem">
      <button onclick="mTab('escuelas')" class="m-action-btn" style="background:#f1f5f9;color:#374151">Cancelar</button>
      <button onclick="mGuardarPwd('${email}')" class="m-action-btn m-btn-p">Asignar</button>
    </div></div>`;
    document.getElementById('m-content').innerHTML=form;
  };

  window.mGuardarPwd=async email=>{
    const pwd=document.getElementById('mf-pwd').value;
    const pwd2=document.getElementById('mf-pwd2').value;
    if(pwd!==pwd2){alert('Las contraseñas no coinciden');return;}
    if(pwd.length<6){alert('Mínimo 6 caracteres');return;}
    try{
      await auth.createUserWithEmailAndPassword(email,pwd);
      alert('✅ Contraseña asignada');mTab('escuelas');
    }catch(e){
      if(e.code==='auth/email-already-in-use')alert('ℹ️ Usuario ya existe. Para cambiar contraseña usa Firebase Console → Authentication');
      else alert('Error: '+e.message);
    }
  };

  window.mNuevoPrograma=()=>{
    const form=`<div class="m-card"><div class="m-section">Nuevo Programa</div>
    <div style="margin-bottom:.75rem"><label style="font-size:.8rem;font-weight:600;display:block;margin-bottom:.3rem">Nombre *</label><input id="mf-pnom" style="width:100%;padding:.65rem;border:1px solid #e2e8f0;border-radius:8px;font-family:inherit"></div>
    <div style="margin-bottom:.75rem"><label style="font-size:.8rem;font-weight:600;display:block;margin-bottom:.3rem">Fecha Límite *</label><input id="mf-pfecha" type="date" style="width:100%;padding:.65rem;border:1px solid #e2e8f0;border-radius:8px;font-family:inherit"></div>
    <div style="margin-bottom:.75rem"><label style="font-size:.8rem;font-weight:600;display:block;margin-bottom:.3rem">Documentos requeridos</label>
    <div style="display:flex;gap:.5rem;margin-bottom:.5rem"><input id="mf-pdoc" placeholder="Nombre del documento" style="flex:1;padding:.65rem;border:1px solid #e2e8f0;border-radius:8px;font-family:inherit">
    <button onclick="mAgregarDoc()" style="padding:.65rem 1rem;border-radius:8px;border:none;background:#3b82f6;color:#fff;cursor:pointer;font-family:inherit">+</button></div>
    <div id="mf-pdocs"></div></div>
    <div style="display:flex;gap:.5rem">
      <button onclick="mTab('programas')" class="m-action-btn" style="background:#f1f5f9;color:#374151">Cancelar</button>
      <button onclick="mGuardarPrograma()" class="m-action-btn m-btn-p">Guardar</button>
    </div></div>`;
    document.getElementById('m-content').innerHTML=form;
    window._docs=[];
  };

  window.mAgregarDoc=()=>{
    const inp=document.getElementById('mf-pdoc');
    if(!inp.value.trim())return;
    window._docs.push(inp.value.trim());inp.value='';
    document.getElementById('mf-pdocs').innerHTML=window._docs.map((d,i)=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:.4rem .6rem;background:#f1f5f9;border-radius:6px;margin-bottom:.3rem;font-size:.8rem">${d}<button onclick="window._docs.splice(${i},1);mAgregarDoc()" style="border:none;background:none;color:#ef4444;cursor:pointer">×</button></div>`).join('');
  };

  window.mGuardarPrograma=async()=>{
    const nombre=document.getElementById('mf-pnom').value.trim();
    const fecha=document.getElementById('mf-pfecha').value;
    if(!nombre||!fecha||!window._docs.length){alert('Completa todos los campos y agrega al menos un documento');return;}
    const data={nombre,fechaLimite:fecha,documentosRequeridos:window._docs,todasEscuelas:true,escuelasAsignadas:[]};
    try{const ref=await db.collection('programas').add(data);estado.programas.push({id:ref.id,...data});mTab('programas');}
    catch(e){alert('Error al guardar');}
  };

  window.mEditarPrograma=id=>{
    const p=estado.programas.find(x=>x.id===id);
    if(!p)return;
    const form=`<div class="m-card"><div class="m-section">Editar Programa</div>
    <div style="margin-bottom:.75rem"><label style="font-size:.8rem;font-weight:600;display:block;margin-bottom:.3rem">Nombre *</label><input id="mf-pnom" value="${p.nombre}" style="width:100%;padding:.65rem;border:1px solid #e2e8f0;border-radius:8px;font-family:inherit"></div>
    <div style="margin-bottom:.75rem"><label style="font-size:.8rem;font-weight:600;display:block;margin-bottom:.3rem">Fecha Límite *</label><input id="mf-pfecha" type="date" value="${p.fechaLimite}" style="width:100%;padding:.65rem;border:1px solid #e2e8f0;border-radius:8px;font-family:inherit"></div>
    <div style="margin-bottom:.75rem"><label style="font-size:.8rem;font-weight:600;display:block;margin-bottom:.3rem">Documentos requeridos</label>
    <div style="display:flex;gap:.5rem;margin-bottom:.5rem"><input id="mf-pdoc" placeholder="Agregar documento" style="flex:1;padding:.65rem;border:1px solid #e2e8f0;border-radius:8px;font-family:inherit">
    <button onclick="mAgregarDoc()" style="padding:.65rem 1rem;border-radius:8px;border:none;background:#3b82f6;color:#fff;cursor:pointer;font-family:inherit">+</button></div>
    <div id="mf-pdocs"></div></div>
    <div style="display:flex;gap:.5rem">
      <button onclick="mTab('programas')" class="m-action-btn" style="background:#f1f5f9;color:#374151">Cancelar</button>
      <button onclick="mActualizarPrograma('${id}')" class="m-action-btn m-btn-p">Guardar</button>
    </div></div>`;
    document.getElementById('m-content').innerHTML=form;
    window._docs=[...p.documentosRequeridos];
    document.getElementById('mf-pdocs').innerHTML=window._docs.map((d,i)=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:.4rem .6rem;background:#f1f5f9;border-radius:6px;margin-bottom:.3rem;font-size:.8rem">${d}<button onclick="window._docs.splice(${i},1);mAgregarDoc()" style="border:none;background:none;color:#ef4444;cursor:pointer">×</button></div>`).join('');
  };

  window.mActualizarPrograma=async id=>{
    const nombre=document.getElementById('mf-pnom').value.trim();
    const fecha=document.getElementById('mf-pfecha').value;
    if(!nombre||!fecha||!window._docs.length){alert('Completa todos los campos');return;}
    const p=estado.programas.find(x=>x.id===id);
    const data={...p,nombre,fechaLimite:fecha,documentosRequeridos:window._docs};
    try{await db.collection('programas').doc(id).update(data);estado.programas=estado.programas.map(x=>x.id===id?data:x);mTab('programas');}
    catch(e){alert('Error al guardar');}
  };

  window.mNuevoCompartido=()=>{
    const form=`<div class="m-card"><div class="m-section">Subir Archivo Compartido</div>
    <div style="margin-bottom:.75rem"><label style="font-size:.8rem;font-weight:600;display:block;margin-bottom:.3rem">Nombre *</label><input id="mf-cnom" style="width:100%;padding:.65rem;border:1px solid #e2e8f0;border-radius:8px;font-family:inherit"></div>
    <div style="margin-bottom:.75rem"><label style="font-size:.8rem;font-weight:600;display:block;margin-bottom:.3rem">Descripción</label><textarea id="mf-cdesc" style="width:100%;padding:.65rem;border:1px solid #e2e8f0;border-radius:8px;font-family:inherit" rows="2"></textarea></div>
    <div style="margin-bottom:.75rem"><label style="font-size:.8rem;font-weight:600;display:block;margin-bottom:.3rem">Archivo *</label><input id="mf-cfile" type="file" style="width:100%;padding:.65rem;border:1px solid #e2e8f0;border-radius:8px;font-family:inherit"></div>
    <div style="display:flex;gap:.5rem">
      <button onclick="mTab('compartidos')" class="m-action-btn" style="background:#f1f5f9;color:#374151">Cancelar</button>
      <button onclick="mGuardarCompartido()" id="mf-cbtn" class="m-action-btn m-btn-p">Subir</button>
    </div></div>`;
    document.getElementById('m-content').innerHTML=form;
  };

  window.mGuardarCompartido=async()=>{
    const nombre=document.getElementById('mf-cnom').value.trim();
    const file=document.getElementById('mf-cfile').files[0];
    if(!nombre||!file){alert('Completa todos los campos');return;}
    document.getElementById('mf-cbtn').textContent='Subiendo...';
    try{
      const ref=storage.ref(`compartidos/${Date.now()}_${file.name}`);
      await ref.put(file);
      const url=await ref.getDownloadURL();
      const data={nombre,descripcion:document.getElementById('mf-cdesc').value,url,fecha:new Date().toISOString()};
      const r=await db.collection('compartidos').add(data);
      estado.compartidos.push({id:r.id,...data});
      mTab('compartidos');
    }catch(e){alert('Error al subir');}
  };
}
</script>
