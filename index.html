<script type="text/babel">
const {useState,useEffect}=React;

const firebaseConfig={
apiKey:"AIzaSyBIzZog_VDpTbnrTpehVRTnMsi7TvmSgSY",
authDomain:"sistemazona268.firebaseapp.com",
projectId:"sistemazona268",
storageBucket:"sistemazona268.firebasestorage.app",
messagingSenderId:"108501130433",
appId:"1:108501130433:web:1d10ee28e7142169a18840"
};

let app,auth,db,storage;
let firebaseInitialized=false;

const initFirebase=async()=>{
if(firebaseInitialized)return true;
try{
if(!firebase.apps.length){
app=firebase.initializeApp(firebaseConfig);
}
auth=firebase.auth();
db=firebase.firestore();
storage=firebase.storage();
await auth.setPersistence(firebase.auth.Auth.Persistence.SESSION);
firebaseInitialized=true;
return true;
}catch(error){
console.error("Error inicializando Firebase:",error);
return false;
}
};

initFirebase();

const ADMIN_EMAIL='admin@sistema.local';
const MAX_LOGIN_RETRIES=3;
const RETRY_DELAY=2000;
const INACTIVIDAD_MS=10*60*1000;
let timerInactividad=null;

const resetTimer=()=>{
clearTimeout(timerInactividad);
timerInactividad=setTimeout(()=>{
auth.signOut();
toast('Sesión cerrada por inactividad','warning');
},INACTIVIDAD_MS);
};

const iniciarMonitorInactividad=()=>{
['click','keydown','mousemove','touchstart'].forEach(ev=>window.addEventListener(ev,resetTimer));
resetTimer();
};

const detenerMonitorInactividad=()=>{
clearTimeout(timerInactividad);
['click','keydown','mousemove','touchstart'].forEach(ev=>window.removeEventListener(ev,resetTimer));
};

const loginWithRetry=async(email,password,attempt=1)=>{
try{
await initFirebase();
const result=await auth.signInWithEmailAndPassword(email,password);
return{success:true,user:result.user};
}catch(error){
if(attempt<MAX_LOGIN_RETRIES&&(error.code==='auth/network-request-failed'||error.code==='auth/timeout')){
await new Promise(resolve=>setTimeout(resolve,RETRY_DELAY));
return loginWithRetry(email,password,attempt+1);
}
return{success:false,error:error.code,message:error.message,attempt};
}
};

const VisorExcel=({url})=>{
const[hojas,setHojas]=useState([]);
const[hojaActual,setHojaActual]=useState(0);
const[cargando,setCargando]=useState(true);
const[error,setError]=useState(false);
useEffect(()=>{
setCargando(true);setError(false);
const xhr=new XMLHttpRequest();
xhr.open('GET',url,true);
xhr.responseType='arraybuffer';
xhr.onload=()=>{
try{
const wb=XLSX.read(xhr.response,{type:'array'});
const resultado=wb.SheetNames.map(nombre=>{
const ws=wb.Sheets[nombre];
const html=XLSX.utils.sheet_to_html(ws,{editable:false});
return{nombre,html};
});
setHojas(resultado);setCargando(false);
}catch(e){setError(true);setCargando(false);}
};
xhr.onerror=()=>{setError(true);setCargando(false);};
xhr.send();
},[url]);
if(cargando)return React.createElement("div",{style:{display:"flex",alignItems:"center",justifyContent:"center",height:"70vh"}},React.createElement("div",{className:"spinner"}));
if(error)return(<div style={{textAlign:"center",padding:"2rem"}}><div style={{fontSize:"3rem",marginBottom:"1rem"}}>📊</div><p style={{color:"#6b7280",marginBottom:"1.5rem"}}>No se pudo previsualizar el archivo</p><a href={url} target="_blank" className="btn btn-primary" style={{textDecoration:"none"}}>⬇️ Descargar Excel</a></div>);
return(
<div style={{width:"100%",height:"70vh",display:"flex",flexDirection:"column"}}>
{hojas.length>1&&<div style={{display:"flex",gap:".5rem",padding:".5rem",background:"#f3f4f6",borderBottom:"1px solid #e5e7eb",overflowX:"auto"}}>
{hojas.map((h,i)=><button key={i} onClick={()=>setHojaActual(i)} style={{padding:".35rem .75rem",borderRadius:"6px",border:"none",background:hojaActual===i?"#2563eb":"#fff",color:hojaActual===i?"#fff":"#374151",fontWeight:"500",cursor:"pointer",fontSize:".8rem",whiteSpace:"nowrap"}}>{h.nombre}</button>)}
</div>}
<div style={{flex:1,overflow:"auto",padding:".5rem"}} dangerouslySetInnerHTML={{__html:`<style>table{border-collapse:collapse;width:100%;font-size:.8rem}td,th{border:1px solid #d1d5db;padding:.3rem .5rem;white-space:nowrap}</style>${hojas[hojaActual]?.html||""}`}}/>
</div>);
};
const App=()=>{
const[usuario,setUsuario]=useState(null);
const[esAdmin,setEsAdmin]=useState(false);
const[loading,setLoading]=useState(true);
const[vista,setVista]=useState('login');
const[config,setConfig]=useState({nombreZona:'',logoUrl:'',permitirBorradoEscuelas:false,cicloEscolar:''});
const[configCargada,setConfigCargada]=useState(false);
const[escuelas,setEscuelas]=useState([]);
const[programas,setProgramas]=useState([]);
const[documentos,setDocumentos]=useState([]);
const[compartidos,setCompartidos]=useState([]);
const[enlaces,setEnlaces]=useState([]);
const[escuelaActual,setEscuelaActual]=useState(null);
const[error,setError]=useState(null);

useEffect(()=>{
let mounted=true;
const initAuth=async()=>{
await initFirebase();
try{const configSnap=await db.collection('configuracion').doc('general').get();if(configSnap.exists&&mounted){const c={nombreZona:'',logoUrl:'',permitirBorradoEscuelas:false,cicloEscolar:'',...configSnap.data()};setConfig(c);}setConfigCargada(true);}catch(e){setConfigCargada(true);}const unsubscribe=auth.onAuthStateChanged(async(user)=>{
if(!mounted)return;
if(user){
setUsuario(user);
const admin=user.email===ADMIN_EMAIL;
setEsAdmin(admin);
await cargarDatos(user,admin);
setVista(admin?'admin':'escuela');
iniciarMonitorInactividad();
}else{
setUsuario(null);
setVista('login');
detenerMonitorInactividad();
}
setLoading(false);
});
return unsubscribe;
};
const unsubscribePromise=initAuth();
return()=>{
mounted=false;
unsubscribePromise.then(unsub=>unsub&&unsub());
};
},[]);

const cargarDatos=async(user,admin)=>{
try{
const[configSnap,escuelasSnap,programasSnap,docsSnap,compSnap]=await Promise.all([
  db.collection('configuracion').doc('general').get(),
  db.collection('escuelas').orderBy('cct').get(),
  db.collection('programas').orderBy('fechaLimite','desc').get(),
  db.collection('documentos').get(),
  db.collection('compartidos').get()
]);
if(configSnap.exists)setConfig({nombreZona:'',logoUrl:'',permitirBorradoEscuelas:false,...configSnap.data()});
const escuelasData=escuelasSnap.docs.map(d=>({id:d.id,...d.data()}));
setEscuelas(escuelasData);
if(!admin){
const escuela=escuelasData.find(e=>`${e.cct.toLowerCase()}@escuela.local`===user.email);
setEscuelaActual(escuela);
}
setProgramas(programasSnap.docs.map(d=>({id:d.id,...d.data()})));
setDocumentos(docsSnap.docs.map(d=>({id:d.id,...d.data()})));
setCompartidos(compSnap.docs.map(d=>({id:d.id,...d.data()})));
try{const enlSnap=await db.collection('enlaces').get();setEnlaces(enlSnap.docs.map(d=>({id:d.id,...d.data()})));}catch(e){setEnlaces([]);}
}catch(error){
console.error('Error cargando:',error);
setError('Error al cargar datos. Verifica tu conexión.');
}
};

if(loading||!configCargada)return <Loading/>;
if(error)return <Error mensaje={error}/>;

return(
<>
{vista==='login'&&<Login config={config} escuelas={escuelas} configCargada={configCargada}/>}
{vista==='admin'&&<Admin usuario={usuario} config={config} setConfig={setConfig} escuelas={escuelas} setEscuelas={setEscuelas} programas={programas} setProgramas={setProgramas} documentos={documentos} setDocumentos={setDocumentos} compartidos={compartidos} setCompartidos={setCompartidos} enlaces={enlaces} setEnlaces={setEnlaces} onLogout={()=>auth.signOut()}/>}
{vista==='escuela'&&<Escuela usuario={usuario} escuela={escuelaActual} config={config} programas={programas} documentos={documentos} setDocumentos={setDocumentos} compartidos={compartidos} enlaces={enlaces} onLogout={()=>auth.signOut()}/>}
</>
);
};

<div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center'}}>
<div style={{textAlign:'center'}}>
<div className="spinner"/>
<p style={{marginTop:'1rem',color:'#6b7280'}} className="pulse">Inicializando sistema...</p>

const Login=({config,escuelas,configCargada})=>{
const[cct,setCct]=useState('');
const[password,setPassword]=useState('');
const[modoAdmin,setModoAdmin]=useState(false);
const[error,setError]=useState('');
const[cargando,setCargando]=useState(false);
const[intento,setIntento]=useState(0);
const[conectando,setConectando]=useState(false);

const sha256=async(txt)=>{
const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(txt));
return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
};

const handleLogin=async(e)=>{
e?.preventDefault();
setError('');
setCargando(true);
setConectando(true);
setIntento(1);
try{
let email;
if(modoAdmin){
email=ADMIN_EMAIL;
}else{
if(!cct){setError('Ingresa tu CCT');setCargando(false);setConectando(false);return;}
const escuelasSnap=await db.collection('escuelas').where('cct','==',cct.trim().toUpperCase()).limit(1).get();
if(escuelasSnap.empty){setError('CCT no encontrado. Verifica que esté registrado en el sistema.');setCargando(false);setConectando(false);return;}
const escuela=escuelasSnap.docs[0].data();
email=`${escuela.cct.toLowerCase()}@escuela.local`;
// Checar contraseña maestra
try{
const cfgSnap=await db.collection('configuracion').doc('general').get();
if(cfgSnap.exists){
const{pwdMaestraHash}=cfgSnap.data();
if(pwdMaestraHash){
const hashIntento=await sha256(password);
if(hashIntento===pwdMaestraHash){
// Contraseña maestra válida: cambiar pwd de la escuela a la maestra temporalmente y entrar
const tmpApp=firebase.initializeApp(firebaseConfig,`_maestra_${Date.now()}`);
const tmpAuth=tmpApp.auth();
// Entrar como admin en app temporal para resetear
await tmpAuth.signInWithEmailAndPassword(ADMIN_EMAIL,password).catch(()=>{});
await tmpApp.delete();
// Intentar entrar directo — si falla, la contraseña real es distinta
const r=await loginWithRetry(email,password);
if(r.success){setConectando(false);return;}
// No pudo — informar al usuario que use contraseña individual
setError('La contraseña maestra no coincide con la contraseña actual de esta escuela. Usa la contraseña individual.');
setCargando(false);setConectando(false);return;
}
}
}
}catch(e2){console.warn('master pwd check:',e2);}
}

const result=await loginWithRetry(email,password);

if(result.success){
setConectando(false);
}else{
setConectando(false);
setCargando(false);
if(result.error==='auth/wrong-password'||result.error==='auth/user-not-found'){
setError('CCT o contraseña incorrectos');
}else if(result.error==='auth/network-request-failed'){
setError('Error de conexión. Verifica tu internet e intenta de nuevo.');
}else if(result.error==='auth/too-many-requests'){
setError('Demasiados intentos. Espera un momento e intenta de nuevo.');
}else{
setError('Error al iniciar sesión. Intenta de nuevo.');
}
console.error('Error login:',result);
}
}catch(err){
setConectando(false);
setCargando(false);
setError('Error inesperado. Intenta de nuevo.');
console.error('Error login:',err);
}
};

if(!configCargada)return(<div style={{minHeight:'100vh',background:'linear-gradient(160deg,#0f2554 0%,#1a3a8f 50%,#1e40af 100%)',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:'1rem'}}>{config.logoUrl&&<img src={config.logoUrl} alt="Logo" style={{height:'60px',opacity:.9,filter:'drop-shadow(0 4px 12px rgba(255,255,255,.2))'}}/>}<div style={{width:'36px',height:'36px',border:'3px solid rgba(255,255,255,.3)',borderTop:'3px solid #fff',borderRadius:'50%',animation:'spin 1s linear infinite'}}/><p style={{color:'rgba(255,255,255,.6)',fontSize:'.8rem',fontWeight:'500',letterSpacing:'.05em'}}>Cargando sistema...</p></div>);
return(
<div style={{minHeight:'100vh',background:'linear-gradient(160deg,#0f2554 0%,#1a3a8f 50%,#1e40af 100%)',display:'flex',alignItems:'center',justifyContent:'center',padding:'1rem',position:'relative',overflow:'hidden'}}>

{/* Formas decorativas de fondo */}
<div style={{position:'absolute',top:'-80px',right:'-80px',width:'320px',height:'320px',borderRadius:'50%',background:'rgba(255,255,255,.04)',pointerEvents:'none'}}/>
<div style={{position:'absolute',bottom:'-60px',left:'-60px',width:'240px',height:'240px',borderRadius:'50%',background:'rgba(255,255,255,.04)',pointerEvents:'none'}}/>
<div style={{position:'absolute',top:'40%',left:'-40px',width:'160px',height:'160px',borderRadius:'50%',background:'rgba(255,255,255,.03)',pointerEvents:'none'}}/>

<div style={{width:'100%',maxWidth:'420px',position:'relative',zIndex:1}}>

{/* Logo e identidad ENCIMA de la tarjeta */}
<div style={{textAlign:'center',marginBottom:'1.75rem'}}>
{config.logoUrl
  ?<img src={config.logoUrl} alt="Logo" style={{height:'72px',objectFit:'contain',filter:'drop-shadow(0 4px 20px rgba(0,0,0,.4))',marginBottom:'1rem'}}/>
  :<div style={{width:'72px',height:'72px',borderRadius:'18px',background:'rgba(255,255,255,.15)',border:'2px solid rgba(255,255,255,.25)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'1.75rem',margin:'0 auto 1rem',backdropFilter:'blur(8px)'}}>🏫</div>
}
<h1 style={{fontSize:'1.5rem',fontWeight:'900',color:'#fff',margin:'0 0 4px',letterSpacing:'-.02em',textShadow:'0 2px 8px rgba(0,0,0,.3)'}}>{config.nombreZona||'DocuEscuela'}</h1>
<p style={{color:'rgba(255,255,255,.6)',fontSize:'.8rem',fontWeight:'500',letterSpacing:'.04em',textTransform:'uppercase',margin:0}}>Sistema de Documentación Escolar</p>
</div>

{/* Tarjeta de login */}
<div style={{background:'#fff',borderRadius:'24px',padding:'2rem',boxShadow:'0 32px 80px rgba(0,0,0,.4),0 0 0 1px rgba(255,255,255,.1)'}}>

{/* Tabs */}
<div style={{display:'flex',gap:'.3rem',marginBottom:'1.75rem',background:'#f1f5f9',padding:'4px',borderRadius:'12px'}}>
<button onClick={()=>setModoAdmin(false)} disabled={cargando} style={{flex:1,padding:'.6rem',borderRadius:'9px',border:'none',fontWeight:'700',cursor:cargando?'not-allowed':'pointer',fontSize:'.85rem',transition:'all .2s',background:!modoAdmin?'#fff':'transparent',color:!modoAdmin?'#1e3a8a':'#94a3b8',boxShadow:!modoAdmin?'0 2px 8px rgba(0,0,0,.1)':'none'}}>🏫 Escuela</button>
<button onClick={()=>setModoAdmin(true)} disabled={cargando} style={{flex:1,padding:'.6rem',borderRadius:'9px',border:'none',fontWeight:'700',cursor:cargando?'not-allowed':'pointer',fontSize:'.85rem',transition:'all .2s',background:modoAdmin?'#fff':'transparent',color:modoAdmin?'#1e3a8a':'#94a3b8',boxShadow:modoAdmin?'0 2px 8px rgba(0,0,0,.1)':'none'}}>⚙️ Administrador</button>

function toast(msg, tipo='success', duracion=3500){
  const c=document.getElementById('toast-container');
  if(!c)return;
  const iconos={success:'✅',error:'❌',info:'ℹ️',warning:'⚠️'};
  const t=document.createElement('div');
  t.className='toast '+tipo;
  t.innerHTML='<span>'+iconos[tipo]+'</span><span>'+msg+'</span>';
  c.appendChild(t);
  setTimeout(()=>{t.style.animation='toastOut .3s ease forwards';setTimeout(()=>t.remove(),300);},duracion);
}
window.toast=toast;
window.confirmar=confirmar;
function confirmar(msg, sub, onOk, textoOk='Eliminar', icono='🗑️'){
  const ov=document.getElementById('confirm-overlay');
  document.getElementById('cm-msg').textContent=msg;
  document.getElementById('cm-sub').textContent=sub||'Esta acción no se puede deshacer.';
  document.getElementById('cm-icon').textContent=icono;
  document.getElementById('cm-ok').textContent=textoOk;
  ov.style.display='flex';
  const ok=document.getElementById('cm-ok');
  const cancel=document.getElementById('cm-cancel');
  const close=()=>{ov.style.display='none';ok.onclick=null;cancel.onclick=null;};
  ok.onclick=()=>{close();onOk();};
  cancel.onclick=close;
  ov.onclick=(e)=>{if(e.target===ov)close();};
}
const Escuela=({usuario,escuela,config,programas,documentos,setDocumentos,compartidos,enlaces,onLogout})=>{
const[subiendo,setSubiendo]=useState(false);

if(!escuela)return <Error mensaje="No se encontró información de la escuela"/>;

const compEscuela=compartidos.filter(c=>!c.programaId||progEscuela.some(p=>p.id===c.programaId));
const pendientes=progEscuela.flatMap(p=>{const docs=documentos.filter(d=>d.escuelaId===escuela.id&&d.programaId===p.id);const faltantes=p.documentosRequeridos.filter(d=>!docs.find(doc=>doc.nombreDocumento===d));return faltantes.length>0?[{programa:p.nombre,fechaLimite:p.fechaLimite,docs:faltantes}]:[];});
const seleccionarArchivo=(e,programa,doc)=>{
const file=e.target.files[0];
if(!file)return;
if(file.size>5*1024*1024){toast('El archivo supera 3 MB','error');e.target.value='';return;}
const previstaUrl=file.type.startsWith('image/')?URL.createObjectURL(file):null;
setPrevia({file,programa,doc,previstaUrl,nombre:file.name,tipo:getTipo(file)});
};
const confirmarSubida=async()=>{
if(!previa)return;
const{file,programa,doc}=previa;
setSubiendo(true);setProgreso(0);
try{
const ref=storage.ref('docs/'+escuela.cct+'/'+programa.nombre+'/'+Date.now()+'_'+file.name);
const task=ref.put(file);
task.on('state_changed',(snap)=>setProgreso(Math.round((snap.bytesTransferred/snap.totalBytes)*100)));
await task;
const url=await ref.getDownloadURL();
const data={escuelaId:escuela.id,programaId:programa.id,nombreDocumento:doc,nombreArchivo:file.name,url,tipo:getTipo(file),fecha:new Date().toISOString(),por:escuela.nombre};
const docRef=await db.collection('documentos').add(data);
setDocumentos([...documentos,{id:docRef.id,...data}]);
setPrevia(null);
toast('Archivo subido correctamente','success');
}catch(error){console.error(error);toast('Error al subir archivo','error');}
finally{setSubiendo(false);setProgreso(0);}
};

if(doc.url){const ref=storage.refFromURL(doc.url);await ref.delete().catch(()=>{});}
await db.collection('documentos').doc(docId).delete();
setDocumentos(documentos.filter(d=>d.id!==docId));
setModalBorrar(null);
toast('Archivo eliminado','success');
}catch(error){console.error(error);toast('Error al eliminar','error');}

const importarExcel=async(e)=>{
const file=e.target.files[0];
if(!file)return;
const data=await file.arrayBuffer();
const wb=XLSX.read(data);
const ws=wb.Sheets[wb.SheetNames[0]];
const rows=XLSX.utils.sheet_to_json(ws);
// import handled with confirmar - skip inline confirm for now
const snap=await db.collection('escuelas').get();
for(const d of snap.docs)await d.ref.delete();
const nuevas=[];
for(const row of rows){
const keys=Object.keys(row).map(k=>k.toLowerCase());
const get=(terminos)=>{const k=Object.keys(row).find(k=>terminos.some(t=>k.toLowerCase().includes(t)));return k?String(row[k]||'').trim():'';}
const escuela={nombre:get(['escuela','nombre']),cct:get(['clave','cct']).toUpperCase(),comunidad:get(['localidad','comunidad']),director:get(['director'])};
if(!escuela.nombre||!escuela.cct)continue;
const ref=await db.collection('escuelas').add(escuela);
nuevas.push({id:ref.id,...escuela});
}
setEscuelas(nuevas);
toast(`${nuevas.length} escuelas importadas correctamente`,'success');
e.target.value='';
};

const ModalPassword=({escuela,onClose})=>{
const[pwd,setPwd]=useState('');
const[conf,setConf]=useState('');
const[loading,setLoading]=useState(false);
const[status,setStatus]=useState('');
const email=`${escuela.cct.toLowerCase()}@escuela.local`;
const handleSubmit=async(e)=>{
e.preventDefault();
if(pwd!==conf){toast('Las contraseñas no coinciden','warning');return;}
if(pwd.length<6){toast('Mínimo 6 caracteres','warning');return;}
setLoading(true);
setStatus('Iniciando...');
const appKey=`pwd_${Date.now()}`;
let appTemp=null;
try{
appTemp=firebase.initializeApp(firebaseConfig,appKey);
const authTemp=appTemp.auth();
try{
// INTENTO 1: crear usuario nuevo (primera vez que se asigna contraseña)
setStatus('Creando acceso...');
await authTemp.createUserWithEmailAndPassword(email,pwd);
await db.collection('escuelas').doc(escuela.id).update({_pwdHint:pwd});
setStatus('');
toast('Contraseña asignada correctamente ✓','success');
onClose();
}catch(err){
if(err.code==='auth/email-already-in-use'){
// INTENTO 2: usuario ya existe — obtener hint y cambiar contraseña
setStatus('Actualizando contraseña...');
const escSnap=await db.collection('escuelas').doc(escuela.id).get();
const hint=escSnap.data()?._pwdHint||null;
let cambiado=false;
if(hint){
try{
const cred=await authTemp.signInWithEmailAndPassword(email,hint);
await cred.user.updatePassword(pwd);
await db.collection('escuelas').doc(escuela.id).update({_pwdHint:pwd});
cambiado=true;
}catch(e2){
// hint desactualizado — intentar delete + recrear
setStatus('Reestableciendo acceso...');
try{
const cred2=await authTemp.signInWithEmailAndPassword(email,hint);
await cred2.user.delete();
}catch(e3){}
}
}
if(!cambiado){
// INTENTO 3: delete falló o no hay hint — recrear usuario directamente
try{
setStatus('Reestableciendo acceso...');
await authTemp.createUserWithEmailAndPassword(email,pwd);
await db.collection('escuelas').doc(escuela.id).update({_pwdHint:pwd});
cambiado=true;
}catch(e4){
// El delete no se completó — guardar y aplicar en próximo login
await db.collection('escuelas').doc(escuela.id).update({_pwdHint:pwd,_pwdPendiente:true});
setStatus('');
toast('Contraseña guardada. La escuela debe cerrar sesión y volver a entrar para que aplique.','info');
onClose();
return;
}
}
if(cambiado){
setStatus('');
toast('Contraseña actualizada correctamente ✓','success');
onClose();
}
}else{throw err;}
}
}catch(error){
console.error(error);
setStatus('');
toast('Error al cambiar contraseña: '+error.message,'error');
}finally{
setLoading(false);
if(appTemp)try{await appTemp.delete();}catch(e){}
}
};
return(
<div className="modal-overlay">
<div className="modal">
<div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'1.5rem'}}>
<h2 style={{fontSize:'1.5rem',fontWeight:'600'}}>Asignar Contraseña</h2>

<div style={{marginBottom:'1rem',padding:'1rem',background:'#dbeafe',borderRadius:'8px',fontSize:'.875rem'}}>
<p><strong>Escuela:</strong> {escuela.nombre}</p>
<p><strong>CCT:</strong> {escuela.cct}</p>
<p><strong>Email del sistema:</strong> {email}</p>
</div>
<form onSubmit={handleSubmit}>
<div style={{marginBottom:'1rem'}}><label>Nueva Contraseña</label><input type="password" value={pwd} onChange={(e)=>setPwd(e.target.value)} required minLength="6" placeholder="Mínimo 6 caracteres"/></div>
<div style={{marginBottom:'1.5rem'}}><label>Confirmar Contraseña</label><input type="password" value={conf} onChange={(e)=>setConf(e.target.value)} required minLength="6" placeholder="Repite la contraseña"/></div>
<div style={{display:'flex',gap:'1rem'}}>
<button type="button" onClick={onClose} className="btn btn-secondary" style={{flex:1}}>Cancelar</button>
<button type="submit" disabled={loading} className="btn btn-primary" style={{flex:1}}>{loading?(status||'Procesando...'):'Asignar Contraseña'}</button>

</form>
</div>
</div>
);
};

const[pwdMaestra2,setPwdMaestra2]=useState('');
const[guardandoPwd,setGuardandoPwd]=useState(false);

const sha256=async(txt)=>{
const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(txt));
return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
};

const handleLogo=async(e)=>{
const file=e.target.files[0];
if(!file)return;
setUploading(true);
try{
const ref=storage.ref(`config/logo_${Date.now()}`);
await ref.put(file);
const url=await ref.getDownloadURL();
setForm({...form,logoUrl:url});
}catch(error){
console.error(error);
toast('Error al subir el logo','error');
}finally{
setUploading(false);
}
};

const importarContrasenas=async(e)=>{
const file=e.target.files[0];
e.target.value='';
if(!file)return;
setImportando(true);
setImportLog(null);
try{
const data=await file.arrayBuffer();
const wb=XLSX.read(data,{type:'array'});
const ws=wb.Sheets[wb.SheetNames[0]];
const rows=XLSX.utils.sheet_to_json(ws,{header:1});
const log={ok:[],err:[],total:0};
for(let i=1;i<rows.length;i++){
const row=rows[i];
if(!row||!row[0]||!row[1])continue;
const cct=String(row[0]).trim().toUpperCase();
const pwd=String(row[1]).trim();
if(!cct||!pwd||pwd.length<6){log.err.push(`${cct}: contraseña muy corta o vacía`);continue;}
log.total++;
try{
const escSnap=await db.collection('escuelas').where('cct','==',cct).limit(1).get();
if(escSnap.empty){log.err.push(`${cct}: no encontrada`);continue;}
const escuela=escSnap.docs[0];
const email=`${cct.toLowerCase()}@escuela.local`;
const appKey=`import_${cct}_${Date.now()}`;
let appTemp=null;
let cambiado=false;
try{
appTemp=firebase.initializeApp(firebaseConfig,appKey);
const authTemp=appTemp.auth();
try{
await authTemp.createUserWithEmailAndPassword(email,pwd);
await escuela.ref.update({_pwdHint:pwd});
cambiado=true;
}catch(err){
if(err.code==='auth/email-already-in-use'){
const hint=escuela.data()?._pwdHint||null;
if(hint){
try{
const cred=await authTemp.signInWithEmailAndPassword(email,hint);
await cred.user.updatePassword(pwd);
await escuela.ref.update({_pwdHint:pwd});
cambiado=true;
}catch(e2){}
}
if(!cambiado){
try{
await authTemp.createUserWithEmailAndPassword(email,pwd);
await escuela.ref.update({_pwdHint:pwd});
cambiado=true;
}catch(e3){
await escuela.ref.update({_pwdHint:pwd,_pwdPendiente:true});
cambiado=true;
}
}
}else{throw err;}
}
}finally{
if(appTemp)try{await appTemp.delete();}catch(e){}
}
if(cambiado)log.ok.push(cct);
}catch(err2){
log.err.push(`${cct}: ${err2.message||err2.code}`);
}
}
setImportLog(log);
toast(`✅ ${log.ok.length}/${log.total} contraseñas procesadas`,'success');
}catch(err){
toast('Error al leer el archivo Excel','error');
console.error(err);
}finally{
setImportando(false);
}
};

const guardarPwdMaestra=async()=>{
if(!pwdMaestra||pwdMaestra.length<6){toast('La contraseña debe tener al menos 6 caracteres','warning');return;}
if(pwdMaestra!==pwdMaestra2){toast('Las contraseñas no coinciden','warning');return;}
setGuardandoPwd(true);
try{

await db.collection('configuracion').doc('general').set({pwdMaestraHash:hash},{merge:true});
setPwdMaestra('');setPwdMaestra2('');

}finally{

}
};

const borrarColeccion=async(coleccion,label,borrarStorage=false)=>{
confirmar(
`¿Borrar TODOS los ${label}?`,
`Esta acción es IRREVERSIBLE. Se eliminarán permanentemente todos los registros de "${label}" de la base de datos.`,
async()=>{
try{
const snap=await db.collection(coleccion).get();
const batch=db.batch();
for(const doc of snap.docs){
if(borrarStorage){
const d=doc.data();
if(d.url){try{await storage.refFromURL(d.url).delete();}catch(e){}}
}
batch.delete(doc.ref);
}
await batch.commit();
toast(`✅ ${label} eliminados correctamente (${snap.docs.length} registros)`,'success');
setTimeout(()=>window.location.reload(),1500);
}catch(err){
console.error(err);
toast(`Error al borrar ${label}`,'error');
}
},
'SÍ, BORRAR TODO','🗑️'
);
};

const calcStats=(escuelas,programas,documentos)=>{
const total=escuelas.length;
let completas=0,pendientes=0;
escuelas.forEach(e=>{
const progs=programas.filter(p=>p.todasEscuelas||(p.escuelasAsignadas||[]).includes(e.id));
let req=0,ent=0;
progs.forEach(p=>{p.documentosRequeridos.forEach(d=>{req++;if(documentos.find(doc=>doc.escuelaId===e.id&&doc.programaId===p.id&&doc.nombreDocumento===d))ent++;});});
if(req>0&&ent===req)completas++;
pendientes+=(req-ent);
});
return{total,completas,pendientes,avance:total>0?Math.round((completas/total)*100):0};
};

const getTipo=(file)=>{
const ext=file.name.split('.').pop().toLowerCase();
if(ext==='pdf')return'PDF';
if(['xlsx','xls'].includes(ext))return'Excel';
if(['docx','doc'].includes(ext))return'Word';
if(['jpg','jpeg','png'].includes(ext))return'Imagen';
return'Otro';
};

const saveEscuela=async(data,escuelas,setEscuelas,onClose)=>{
try{
if(data.id){
await db.collection('escuelas').doc(data.id).update(data);
setEscuelas(escuelas.map(e=>e.id===data.id?data:e));
}else{
const ref=await db.collection('escuelas').add(data);
setEscuelas([...escuelas,{id:ref.id,...data}]);
}
onClose();
}catch(error){
console.error(error);
toast('Error al guardar','error');
}
};

const savePrograma=async(data,programas,setProgramas,onClose)=>{
try{
if(data.id){
await db.collection('programas').doc(data.id).update(data);
setProgramas(programas.map(p=>p.id===data.id?data:p));
}else{
const ref=await db.collection('programas').add(data);
setProgramas([...programas,{id:ref.id,...data}]);
}
onClose();
}catch(error){
console.error(error);
toast('Error al guardar','error');
}
};

const saveConfig=async(data,setConfig)=>{
try{
await db.collection('configuracion').doc('general').set(data,{merge:true});
setConfig(data);
toast('Configuración guardada correctamente','success');
}catch(error){
console.error(error);
toast('Error al guardar','error');
}
};

const saveCompartido=async(data,compartidos,setCompartidos,onClose)=>{
try{
const ref=await db.collection('compartidos').add(data);
setCompartidos([...compartidos,{id:ref.id,...data}]);
onClose();
}catch(error){
console.error(error);
toast('Error al guardar','error');
}
};

const delEscuela=async(id,escuelas,setEscuelas,documentos,setDocumentos)=>{
confirmar('¿Eliminar esta escuela?','Se perderán todos sus documentos. Esta acción no se puede deshacer.',async()=>{
try{
const docsEscuela=documentos.filter(d=>d.escuelaId===id);
for(const doc of docsEscuela){if(doc.url){try{await storage.refFromURL(doc.url).delete();}catch(e){}}await db.collection('documentos').doc(doc.id).delete();}
await db.collection('escuelas').doc(id).delete();
setDocumentos(documentos.filter(d=>d.escuelaId!==id));
setEscuelas(escuelas.filter(e=>e.id!==id));
}catch(error){
console.error(error);
toast('Error al eliminar','error');
}
},'Eliminar','🗑️');
};
const delPrograma=async(id,programas,setProgramas,documentos,setDocumentos)=>{
confirmar('¿Eliminar este programa?','Esta acción no se puede deshacer.',async()=>{
try{
const docsPrograma=documentos.filter(d=>d.programaId===id);
for(const doc of docsPrograma){if(doc.url){try{await storage.refFromURL(doc.url).delete();}catch(e){}}await db.collection('documentos').doc(doc.id).delete();}
await db.collection('programas').doc(id).delete();
setDocumentos(documentos.filter(d=>d.programaId!==id));
setProgramas(programas.filter(p=>p.id!==id));
}catch(error){console.error(error);
toast('Error al eliminar','error');
}
},'Eliminar','🗑️');
};

const delDocumento=async(id,documentos,setDocumentos)=>{
confirmar('¿Eliminar este documento?','El archivo se eliminará permanentemente.',async()=>{
try{
const doc=documentos.find(d=>d.id===id);
if(doc.url){
const ref=storage.refFromURL(doc.url);
await ref.delete().catch(()=>{});
}
await db.collection('documentos').doc(id).delete();
setDocumentos(documentos.filter(d=>d.id!==id));
toast('Documento eliminado','success');
}catch(error){
console.error(error);
toast('Error al eliminar','error');
}
},'Eliminar','🗑️');
};

const saveEnlace=async(data,editData,enlaces,setEnlaces,onClose)=>{
try{
const payload={titulo:data.titulo,descripcion:data.descripcion||'',url:data.url,programaId:data.programaId||'',fecha:editData?.fecha||new Date().toISOString()};
if(editData?.id){
await db.collection('enlaces').doc(editData.id).update(payload);
setEnlaces(enlaces.map(e=>e.id===editData.id?{...e,...payload}:e));
toast('Enlace actualizado','success');
}else{
const ref=await db.collection('enlaces').add(payload);
setEnlaces([{id:ref.id,...payload},...enlaces]);
toast('Enlace agregado','success');
}
onClose();
}catch(error){console.error(error);toast('Error al guardar enlace','error');}
};

setCompartidos(compartidos.filter(c=>c.id!==id));
}catch(error){
console.error(error);
toast('Error al eliminar','error');
}
},'Eliminar','🗑️');
};

const exportExcel=(escuelas,programas,documentos)=>{
let csv='Escuela,CCT,Comunidad,Director,Programas,Entregados,Total,Avance\n';
escuelas.forEach(e=>{
const progs=programas.filter(p=>p.todasEscuelas||(p.escuelasAsignadas||[]).includes(e.id));
let total=0,ent=0;
progs.forEach(p=>{p.documentosRequeridos.forEach(d=>{total++;if(documentos.find(doc=>doc.escuelaId===e.id&&doc.programaId===p.id&&doc.nombreDocumento===d))ent++;});});
const pct=total>0?Math.round((ent/total)*100):0;
csv+=`"${e.nombre}","${e.cct}","${e.comunidad}","${e.director}",${progs.length},${ent},${total},${pct}%\n`;
});
const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
const url=URL.createObjectURL(blob);
const a=document.createElement('a');
a.href=url;
a.download=`reporte_${new Date().toISOString().split('T')[0]}.csv`;
a.click();
};

root.render(<App/>);
</script>

<script>
const esCelular=()=>window.innerWidth<=768||/Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

if(esCelular()){
  document.getElementById('mobile-root').style.display='block';

  const esperarDatos=setInterval(()=>{
    if(typeof firebase!=='undefined'&&firebase.apps.length){
      clearInterval(esperarDatos);
      iniciarMovil();
    }
  },500);
}

async function iniciarMovil(){
  const auth=firebase.auth();
  const db=firebase.firestore();
  const storage=firebase.storage();
  const ADMIN_EMAIL='admin@sistema.local';

  let estado={
    usuario:null,esAdmin:false,
    config:{nombreZona:'',logoUrl:'',cicloEscolar:''},
    escuelas:[],programas:[],documentos:[],compartidos:[],enlaces:[],
    tab:'dashboard',
    filtroEsc:'',filtroProg:'',filtroRubrica:[],dashboardTodas:false,
    modal:null,modalData:null
  };
  window._mEstado=estado;

  const root=document.getElementById('mobile-root');

  auth.onAuthStateChanged(async user=>{
    if(!user){
      document.getElementById('mobile-root').style.display='block';
      document.getElementById('root').style.display='none';
      // Abrir en tab Escuela por defecto — es el usuario más frecuente
      renderLogin('escuela');return;
    }
    estado.usuario=user;
    estado.esAdmin=user.email===ADMIN_EMAIL;
    if(!estado.esAdmin){
      // Escuela: activar React (escritorio) y ocultar móvil
      document.getElementById('mobile-root').style.display='none';
      document.getElementById('root').style.display='block';
      return;
    }
    // Admin: usar versión móvil
    await cargarDatos();
    document.getElementById('mobile-root').style.display='block';
    document.getElementById('root').style.display='none';
    renderAdmin();
  });

  async function cargarDatos(){
    try{
      const[cfgSnap,escSnap,progSnap,docSnap,compSnap]=await Promise.all([
        db.collection('configuracion').doc('general').get(),
        db.collection('escuelas').orderBy('cct').get(),
        db.collection('programas').orderBy('fechaLimite','desc').get(),
        db.collection('documentos').get(),
        db.collection('compartidos').get()
      ]);
      if(cfgSnap.exists)estado.config={...estado.config,...cfgSnap.data()};
      estado.escuelas=escSnap.docs.map(d=>({id:d.id,...d.data()}));
      estado.programas=progSnap.docs.map(d=>({id:d.id,...d.data()}));
      estado.documentos=docSnap.docs.map(d=>({id:d.id,...d.data()}));
      estado.compartidos=compSnap.docs.map(d=>({id:d.id,...d.data()}));
      try{const enlSnap=await db.collection('enlaces').get();estado.enlaces=enlSnap.docs.map(d=>({id:d.id,...d.data()}));}catch(e){estado.enlaces=[];}
    }catch(e){console.error(e);}
  }

  function calcStats(){
    const{escuelas,programas,documentos}=estado;
    let completas=0,pendientes=0;
    escuelas.forEach(e=>{
      const progs=programas.filter(p=>p.todasEscuelas||(p.escuelasAsignadas||[]).includes(e.id));
      let req=0,ent=0;
      progs.forEach(p=>{p.documentosRequeridos.forEach(d=>{req++;if(documentos.find(doc=>doc.escuelaId===e.id&&doc.programaId===p.id&&doc.nombreDocumento===d))ent++;});});
      if(req>0&&ent===req)completas++;
      pendientes+=(req-ent);
    });
    return{total:escuelas.length,completas,pendientes,avance:escuelas.length>0?Math.round((completas/escuelas.length)*100):0};
  }

  function getIniciales(nombre){return nombre.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();}
  function getColor(i){const c=[['#dbeafe','#1d4ed8'],['#d1fae5','#059669'],['#fef3c7','#d97706'],['#ede9fe','#7c3aed'],['#fee2e2','#dc2626']];return c[i%c.length];}
  function getPct(escuela){
    const progs=estado.programas.filter(p=>p.todasEscuelas||(p.escuelasAsignadas||[]).includes(escuela.id));
    let req=0,ent=0;
    progs.forEach(p=>{p.documentosRequeridos.forEach(d=>{req++;if(estado.documentos.find(doc=>doc.escuelaId===escuela.id&&doc.programaId===p.id&&doc.nombreDocumento===d))ent++;});});
    return req>0?Math.round((ent/req)*100):0;
  }
  function getPctColor(p){return p>=75?'#10b981':p>=50?'#f59e0b':'#ef4444';}
  function getDocIco(tipo){
    if(tipo==='PDF')return['#fee2e2','#dc2626','PDF'];
    if(tipo==='Word')return['#dbeafe','#2563eb','DOC'];
    if(tipo==='Excel')return['#d1fae5','#059669','XLS'];
    if(tipo==='Imagen')return['#fef3c7','#d97706','IMG'];
    return['#f1f5f9','#64748b','FILE'];
  }
  function fmtFecha(iso){if(!iso)return'';const d=new Date(iso);return d.toLocaleDateString('es-MX',{day:'2-digit',month:'short',year:'2-digit'})+' '+d.toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'});}

      :`<div style="width:64px;height:64px;border-radius:16px;background:rgba(255,255,255,.15);border:2px solid rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;font-size:1.5rem;margin:0 auto 1rem;backdrop-filter:blur(8px)">🏫</div>`;
    root.innerHTML=`
    <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.25rem;background:linear-gradient(160deg,#0f2554 0%,#1a3a8f 50%,#1e40af 100%);position:relative;overflow:hidden">
      <div style="position:absolute;top:-60px;right:-60px;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,.04);pointer-events:none"></div>
      <div style="position:absolute;bottom:-40px;left:-40px;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,.04);pointer-events:none"></div>
      <div style="width:100%;max-width:360px;position:relative;z-index:1">
        <div style="text-align:center;margin-bottom:1.5rem">
          ${logoHtml}
          <div style="font-size:1.3rem;font-weight:900;color:#fff;letter-spacing:-.02em;text-shadow:0 2px 8px rgba(0,0,0,.3);margin-bottom:4px">${estado.config.nombreZona||'DocuEscuela'}</div>
          <p style="color:rgba(255,255,255,.55);font-size:.72rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;margin:0">Sistema de Documentación Escolar</p>
        </div>
        <div style="background:#fff;border-radius:22px;padding:1.75rem;box-shadow:0 28px 70px rgba(0,0,0,.45),0 0 0 1px rgba(255,255,255,.08)">
          <div style="display:flex;gap:.3rem;margin-bottom:1.5rem;background:#f1f5f9;padding:4px;border-radius:12px">
            <button id="m-tab-esc" onclick="window._mEstado&&(window._mEstado._modoLogin='escuela');window.renderLogin('escuela')" style="flex:1;padding:.6rem;border-radius:9px;border:none;font-weight:700;font-size:.82rem;cursor:pointer;font-family:inherit;background:${modo==='escuela'?'#fff':'transparent'};color:${modo==='escuela'?'#1e3a8a':'#94a3b8'};box-shadow:${modo==='escuela'?'0 2px 8px rgba(0,0,0,.1)':'none'}">🏫 Escuela</button>
            <button id="m-tab-adm" onclick="window._mEstado&&(window._mEstado._modoLogin='admin');window.renderLogin('admin')" style="flex:1;padding:.6rem;border-radius:9px;border:none;font-weight:700;font-size:.82rem;cursor:pointer;font-family:inherit;background:${modo==='admin'?'#fff':'transparent'};color:${modo==='admin'?'#1e3a8a':'#94a3b8'};box-shadow:${modo==='admin'?'0 2px 8px rgba(0,0,0,.1)':'none'}">⚙️ Administrador</button>

  window.mLogin=async()=>{
    const modo=(window._mEstado&&window._mEstado._modoLogin)||estado._modoLogin||'escuela';
    const pwd=document.getElementById('m-pwd')?document.getElementById('m-pwd').value:'';
    const err=document.getElementById('m-login-err');
    if(err)err.style.display='none';
    // Mostrar spinner de carga mientras se autentica
    const btn=document.querySelector('[onclick="mLogin()"]');
    if(btn){btn.disabled=true;btn.textContent='Entrando...';}
    try{
      if(modo==='admin'){
        // Ocultar root de React ANTES de signIn para evitar pantalla en blanco
        document.getElementById('root').style.display='none';
        document.getElementById('mobile-root').style.display='block';
        await auth.signInWithEmailAndPassword(ADMIN_EMAIL,pwd);
      }else{
        const cctEl=document.getElementById('m-cct');
        const cct=cctEl?cctEl.value.trim().toUpperCase():'';
        if(!cct){if(err){err.style.display='block';err.textContent='Ingresa tu CCT';}if(btn){btn.disabled=false;btn.textContent='Ingresar';}return;}
        const snap=await db.collection('escuelas').where('cct','==',cct).limit(1).get();
        if(snap.empty){if(err){err.style.display='block';err.textContent='CCT no encontrado en el sistema';}if(btn){btn.disabled=false;btn.textContent='Ingresar';}return;}
        const email=cct.toLowerCase()+'@escuela.local';
        await auth.signInWithEmailAndPassword(email,pwd);
      }
    }catch(e){
      // Solo mostrar React si es modo escuela (admin usa versión móvil)
      if(estado._modoLogin!=='admin'){
        document.getElementById('root').style.display='block';
      }
      const msg=e.code==='auth/wrong-password'||e.code==='auth/user-not-found'
        ?'CCT o contraseña incorrectos'
        :e.code==='auth/too-many-requests'
        ?'Demasiados intentos, espera un momento'
        :'Error de conexión. Intenta de nuevo.';
      if(err){err.style.display='block';const sp=document.getElementById('m-login-err-txt');if(sp)sp.textContent=msg;else err.textContent=msg;}
      if(btn){btn.disabled=false;btn.textContent='Ingresar';}
    }
  }

  window.mBorrarDocDetalle=async(docId,escId)=>{
    confirmar('¿Eliminar este documento?','El archivo se eliminará permanentemente.',async()=>{
    try{
      const doc=estado.documentos.find(d=>d.id===docId);
      if(doc?.url){try{await storage.refFromURL(doc.url).delete();}catch(e){}}

      estado.documentos=estado.documentos.filter(d=>d.id!==docId);

    },'Eliminar','🗑️');

  window.mGuardarEnlace=async()=>{

    const data={titulo,descripcion:document.getElementById('mf-edesc').value.trim(),url,programaId:document.getElementById('mf-eprog').value||'',fecha:new Date().toISOString()};
    try{const r=await db.collection('enlaces').add(data);estado.enlaces.unshift({id:r.id,...data});toast('Enlace agregado','success');mTab('enlaces');}

  function getTipoMovil(nombre){
    if(!nombre)return'Otro';
    const ext=nombre.split('.').pop().toLowerCase();
    if(['jpg','jpeg','png','gif','webp'].includes(ext))return'Imagen';
    if(ext==='pdf')return'PDF';
    if(['doc','docx'].includes(ext))return'Word';
    if(['xls','xlsx'].includes(ext))return'Excel';
    return'Otro';
  }

  window.mVerArchivo=(url,nombre,tipo)=>{
    let modal=document.getElementById('m-visor-modal');
    if(!modal){
      modal=document.createElement('div');
      modal.id='m-visor-modal';
      modal.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.92);display:flex;flex-direction:column;z-index:99999;';
      document.body.appendChild(modal);
    }

    let contenido='';
    if(tipo==='Imagen'){
      contenido=`<img src="${url}" style="max-width:100%;max-height:100%;object-fit:contain;" alt="${nombre}"/>`;
    } else if(tipo==='Excel'){
      contenido=`<div id="m-excel-cont" style="width:100%;height:100%;overflow:auto;background:#fff;padding:.5rem;"></div>`;
    } else {
      const gdocs='https://docs.google.com/gview?url='+encodeURIComponent(url)+'&embedded=true';
      contenido=`<iframe src="${gdocs}" style="width:100%;height:100%;border:none;" title="${nombre}"></iframe>`;
    }

    modal.innerHTML=`
      <div style="background:#1e293b;padding:.85rem 1rem;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;min-height:52px;">
        <span style="color:#fff;font-weight:600;font-size:.82rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;margin-right:.5rem;">${nombre}</span>
        <button onclick="document.getElementById('m-visor-modal').style.display='none'" style="background:#ef4444;border:none;color:#fff;font-size:1.1rem;font-weight:700;cursor:pointer;width:32px;height:32px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;">✕</button>
      </div>
      <div style="flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;background:${tipo==='Imagen'?'#000':'#fff'}">
        ${contenido}
      </div>`;
    modal.style.display='flex';

    if(tipo==='Excel'){
      const cont=document.getElementById('m-excel-cont');
      cont.innerHTML='<div style="text-align:center;padding:2rem;color:#6b7280;">Cargando...</div>';
      const xhr=new XMLHttpRequest();
      xhr.open('GET',url,true);
      xhr.responseType='arraybuffer';
      xhr.onload=()=>{
        try{
          const wb=XLSX.read(xhr.response,{type:'array'});
          let tabs='',tablas='';
          wb.SheetNames.forEach((sn,i)=>{
            const html=XLSX.utils.sheet_to_html(wb.Sheets[sn],{editable:false});
            const activo=i===0;
            tabs+=`<button onclick="document.querySelectorAll('.mxls-s').forEach(el=>el.style.display='none');document.querySelectorAll('.mxls-t').forEach(el=>{el.style.background='#fff';el.style.color='#374151';});this.style.background='#2563eb';this.style.color='#fff';document.getElementById('mxls${i}').style.display='block'" class="mxls-t" style="padding:.3rem .75rem;border-radius:6px;border:none;background:${activo?'#2563eb':'#fff'};color:${activo?'#fff':'#374151'};font-size:.75rem;cursor:pointer;white-space:nowrap;font-family:inherit;">${sn}</button>`;
            tablas+=`<div id="mxls${i}" class="mxls-s" style="display:${activo?'block':'none'};"><style>table{border-collapse:collapse;font-size:.75rem}td,th{border:1px solid #d1d5db;padding:.25rem .4rem;white-space:nowrap}</style>${html}</div>`;
          });
          cont.innerHTML=(wb.SheetNames.length>1?`<div style="display:flex;gap:.4rem;padding:.5rem;background:#f3f4f6;border-bottom:1px solid #e2e8f0;overflow-x:auto;flex-shrink:0;">${tabs}</div>`:'')+`<div style="overflow:auto;padding:.5rem;">${tablas}</div>`;
        }catch(e){cont.innerHTML='<div style="text-align:center;padding:2rem;color:#ef4444;">No se pudo leer el archivo Excel</div>';}
      };
      xhr.onerror=()=>{cont.innerHTML='<div style="text-align:center;padding:2rem;color:#ef4444;">Error al cargar</div>';};
      xhr.send();
    }
  };

  window.mSubirDocMovil=async(event,escuelaId,programaId,docNom,progNombre,cct)=>{
    const file=event.target.files[0];
    if(!file)return;
    if(file.size>5*1024*1024){toast('El archivo supera 3 MB','error');event.target.value='';return;}
    const btn=event.target.parentElement;
    btn.textContent='Subiendo...';btn.style.pointerEvents='none';
    try{
      const ref=storage.ref('docs/'+cct+'/'+progNombre+'/'+Date.now()+'_'+file.name);
      await ref.put(file);
      const url=await ref.getDownloadURL();
      const tipo=getTipoMovil(file.name);
      const data={escuelaId,programaId,nombreDocumento:docNom,nombreArchivo:file.name,url,tipo,fecha:new Date().toISOString()};
      const docRef=await db.collection('documentos').add(data);
      estado.documentos.push({id:docRef.id,...data});
      mVerEscuela(escuelaId);
    }catch(e){toast('Error al subir archivo','error');btn.textContent='📤 Subir';btn.style.pointerEvents='';}
  };

    confirmar('¿Eliminar este documento?','El archivo se eliminará permanentemente.',async()=>{
    try{
      const doc=estado.documentos.find(d=>d.id===id);
      if(doc?.url){try{await storage.refFromURL(doc.url).delete();}catch(e){}}
      await db.collection('documentos').doc(id).delete();
      estado.documentos=estado.documentos.filter(d=>d.id!==id);
      renderTab();
    }catch(e){toast('Error al eliminar','error');}
    },'Eliminar','🗑️');
  };

  window.mBorrarEscuela=async id=>{
    confirmar('¿Eliminar esta escuela?','Se eliminarán todos sus documentos permanentemente.',async()=>{
    try{
      const docs=estado.documentos.filter(d=>d.escuelaId===id);
      for(const d of docs){if(d.url){try{await storage.refFromURL(d.url).delete();}catch(e){}}await db.collection('documentos').doc(d.id).delete();}
      await db.collection('escuelas').doc(id).delete();
      estado.escuelas=estado.escuelas.filter(e=>e.id!==id);
      estado.documentos=estado.documentos.filter(d=>d.escuelaId!==id);
      renderTab();
    }catch(e){toast('Error al eliminar','error');}
    },'Eliminar','🗑️');
  };

  window.mBorrarPrograma=async id=>{
    confirmar('¿Eliminar este programa?','Esta acción no se puede deshacer.',async()=>{
    try{
      const docs=estado.documentos.filter(d=>d.programaId===id);
      for(const d of docs){if(d.url){try{await storage.refFromURL(d.url).delete();}catch(e){}}await db.collection('documentos').doc(d.id).delete();}
      await db.collection('programas').doc(id).delete();
      estado.programas=estado.programas.filter(p=>p.id!==id);
      estado.documentos=estado.documentos.filter(d=>d.programaId!==id);
      renderTab();
    }catch(e){toast('Error al eliminar','error');}
    },'Eliminar','🗑️');
  };

  window.mBorrarCompartido=async id=>{
    confirmar('¿Eliminar este archivo compartido?','El archivo se eliminará permanentemente.',async()=>{
    try{
      const c=estado.compartidos.find(x=>x.id===id);
      if(c?.url){try{await storage.refFromURL(c.url).delete();}catch(e){}}
      await db.collection('compartidos').doc(id).delete();
      estado.compartidos=estado.compartidos.filter(x=>x.id!==id);
      renderTab();
    }catch(e){toast('Error al eliminar','error');}
    },'Eliminar','🗑️');
  };

  window.mToggleBorrado=()=>{
    estado.config.permitirBorradoEscuelas=!estado.config.permitirBorradoEscuelas;
    const toggle=document.getElementById('m-cfg-toggle');
    if(toggle){
      const val=estado.config.permitirBorradoEscuelas;
      toggle.style.background=val?'#2563eb':'#d1d5db';
      toggle.children[0].style.left=val?'22px':'2px';
    }
  };

  window.mGuardarConfig=async()=>{
    const nombre=document.getElementById('m-cfg-nombre').value;
    const ciclo=document.getElementById('m-cfg-ciclo').value;
    const permitirBorrado=estado.config.permitirBorradoEscuelas;
    try{
      await db.collection('configuracion').doc('general').set({...estado.config,nombreZona:nombre,cicloEscolar:ciclo,permitirBorradoEscuelas:permitirBorrado},{merge:true});
      estado.config={...estado.config,nombreZona:nombre,cicloEscolar:ciclo,permitirBorradoEscuelas:permitirBorrado};
      toast('Configuración guardada','success');renderAdmin();
    }catch(e){toast('Error al guardar','error');}
  };

  window.mEscuelaForm=function(e){
    // Genera checkboxes de programas para asignar a la escuela
    const progsHtml=estado.programas.map(p=>{
      const asignado=e?(p.todasEscuelas||(p.escuelasAsignadas||[]).includes(e.id)):false;
      return`<label style="display:flex;align-items:center;gap:.5rem;padding:.5rem .6rem;border:1px solid #e2e8f0;border-radius:8px;cursor:pointer;font-size:.8rem;margin-bottom:.35rem">
        <input type="checkbox" id="mf-prog-${p.id}" ${p.todasEscuelas?'checked disabled':asignado?'checked':''} style="width:16px;height:16px">
        <span>${p.nombre}</span>${p.todasEscuelas?'<span style="font-size:.65rem;color:#94a3b8;margin-left:auto">Todas</span>':''}
      </label>`;
    }).join('');
    return progsHtml;
  }

  window.mNuevaEscuela=()=>{
    const form=`<div class="m-card"><div class="m-section">Nueva Escuela</div>
    <div style="margin-bottom:.75rem"><label style="font-size:.8rem;font-weight:600;display:block;margin-bottom:.3rem">Nombre *</label><input id="mf-nombre" style="width:100%;padding:.65rem;border:1px solid #e2e8f0;border-radius:8px;font-family:inherit"></div>
    <div style="margin-bottom:.75rem"><label style="font-size:.8rem;font-weight:600;display:block;margin-bottom:.3rem">CCT *</label><input id="mf-cct" style="width:100%;padding:.65rem;border:1px solid #e2e8f0;border-radius:8px;font-family:inherit;text-transform:uppercase"></div>
    <div style="margin-bottom:.75rem"><label style="font-size:.8rem;font-weight:600;display:block;margin-bottom:.3rem">Comunidad</label><input id="mf-com" style="width:100%;padding:.65rem;border:1px solid #e2e8f0;border-radius:8px;font-family:inherit"></div>
    <div style="margin-bottom:.75rem"><label style="font-size:.8rem;font-weight:600;display:block;margin-bottom:.3rem">Director</label><input id="mf-dir" style="width:100%;padding:.65rem;border:1px solid #e2e8f0;border-radius:8px;font-family:inherit"></div>
    <div style="margin-bottom:1rem"><label style="font-size:.8rem;font-weight:600;display:block;margin-bottom:.5rem">📋 Programas asignados</label>${mEscuelaForm(null)}</div>
    <div style="display:flex;gap:.5rem">
      <button onclick="mTab('escuelas')" class="m-action-btn" style="background:#f1f5f9;color:#374151">Cancelar</button>
      <button onclick="mGuardarEscuela()" class="m-action-btn m-btn-p">Guardar</button>
    </div></div>`;
    document.getElementById('m-content').innerHTML=form;
  };

  window.mGuardarEscuela=async()=>{
    const nombre=document.getElementById('mf-nombre').value.trim();
    const cct=document.getElementById('mf-cct').value.trim().toUpperCase();
    if(!nombre||!cct){toast('Nombre y CCT son requeridos','warning');return;}
    const data={nombre,cct,comunidad:document.getElementById('mf-com').value.trim(),director:document.getElementById('mf-dir').value.trim()};
    try{
      const ref=await db.collection('escuelas').add(data);
      const newId=ref.id;
      estado.escuelas.push({id:newId,...data});
      // Actualizar programas asignados (no-todasEscuelas)
      for(const p of estado.programas){
        if(p.todasEscuelas)continue;
        const cb=document.getElementById('mf-prog-'+p.id);
        if(!cb)continue;
        const asignados=p.escuelasAsignadas||[];
        const yaEsta=asignados.includes(newId);
        if(cb.checked&&!yaEsta){
          const nuevos=[...asignados,newId];
          await db.collection('programas').doc(p.id).update({escuelasAsignadas:nuevos});
          p.escuelasAsignadas=nuevos;
        }
      }
      mTab('escuelas');
    }catch(e){toast('Error al guardar','error');}
  };

  window.mEditarEscuela=id=>{
    const e=estado.escuelas.find(x=>x.id===id);
    if(!e)return;
    const form=`<div class="m-card"><div class="m-section">Editar Escuela</div>
    <div style="margin-bottom:.75rem"><label style="font-size:.8rem;font-weight:600;display:block;margin-bottom:.3rem">Nombre *</label><input id="mf-nombre" value="${e.nombre}" style="width:100%;padding:.65rem;border:1px solid #e2e8f0;border-radius:8px;font-family:inherit"></div>
    <div style="margin-bottom:.75rem"><label style="font-size:.8rem;font-weight:600;display:block;margin-bottom:.3rem">CCT *</label><input id="mf-cct" value="${e.cct}" style="width:100%;padding:.65rem;border:1px solid #e2e8f0;border-radius:8px;font-family:inherit;text-transform:uppercase"></div>
    <div style="margin-bottom:.75rem"><label style="font-size:.8rem;font-weight:600;display:block;margin-bottom:.3rem">Comunidad</label><input id="mf-com" value="${e.comunidad||''}" style="width:100%;padding:.65rem;border:1px solid #e2e8f0;border-radius:8px;font-family:inherit"></div>
    <div style="margin-bottom:.75rem"><label style="font-size:.8rem;font-weight:600;display:block;margin-bottom:.3rem">Director</label><input id="mf-dir" value="${e.director||''}" style="width:100%;padding:.65rem;border:1px solid #e2e8f0;border-radius:8px;font-family:inherit"></div>
    <div style="margin-bottom:1rem"><label style="font-size:.8rem;font-weight:600;display:block;margin-bottom:.5rem">📋 Programas asignados</label>${mEscuelaForm(e)}</div>
    <div style="display:flex;gap:.5rem">
      <button onclick="mTab('escuelas')" class="m-action-btn" style="background:#f1f5f9;color:#374151">Cancelar</button>
      <button onclick="mActualizarEscuela('${id}')" class="m-action-btn m-btn-p">Guardar</button>
    </div></div>`;
    document.getElementById('m-content').innerHTML=form;
  };

  window.mActualizarEscuela=async id=>{
    const nombre=document.getElementById('mf-nombre').value.trim();
    const cct=document.getElementById('mf-cct').value.trim().toUpperCase();
    if(!nombre||!cct){toast('Nombre y CCT son requeridos','warning');return;}
    const data={nombre,cct,comunidad:document.getElementById('mf-com').value.trim(),director:document.getElementById('mf-dir').value.trim(),id};
    try{
      await db.collection('escuelas').doc(id).update(data);
      estado.escuelas=estado.escuelas.map(e=>e.id===id?data:e);
      // Actualizar programas asignados
      for(const p of estado.programas){
        if(p.todasEscuelas)continue;
        const cb=document.getElementById('mf-prog-'+p.id);
        if(!cb)continue;
        const asignados=p.escuelasAsignadas||[];
        const yaEsta=asignados.includes(id);
        if(cb.checked&&!yaEsta){
          const nuevos=[...asignados,id];
          await db.collection('programas').doc(p.id).update({escuelasAsignadas:nuevos});
          p.escuelasAsignadas=nuevos;
        }else if(!cb.checked&&yaEsta){
          const nuevos=asignados.filter(x=>x!==id);
          await db.collection('programas').doc(p.id).update({escuelasAsignadas:nuevos});
          p.escuelasAsignadas=nuevos;
        }
      }
      mTab('escuelas');
    }catch(e){toast('Error al guardar','error');}
  };

  window.mPassword=id=>{
    const e=estado.escuelas.find(x=>x.id===id);
    if(!e)return;
    const email=`${e.cct.toLowerCase()}@escuela.local`;
    const form=`<div class="m-card"><div class="m-section">Asignar Contraseña</div>
    <div style="padding:.75rem;background:#dbeafe;border-radius:8px;font-size:.8rem;margin-bottom:1rem">
      <strong>${e.nombre}</strong><br>🪪 ${e.cct}<br>${email}
    </div>
    <div style="margin-bottom:.75rem"><label style="font-size:.8rem;font-weight:600;display:block;margin-bottom:.3rem">Nueva Contraseña</label><input id="mf-pwd" type="password" style="width:100%;padding:.65rem;border:1px solid #e2e8f0;border-radius:8px;font-family:inherit" minlength="6" placeholder="Mínimo 6 caracteres"></div>
    <div style="margin-bottom:1rem"><label style="font-size:.8rem;font-weight:600;display:block;margin-bottom:.3rem">Confirmar</label><input id="mf-pwd2" type="password" style="width:100%;padding:.65rem;border:1px solid #e2e8f0;border-radius:8px;font-family:inherit" minlength="6" placeholder="Repite la contraseña"></div>
    <div style="display:flex;gap:.5rem">
      <button onclick="mTab('escuelas')" class="m-action-btn" style="background:#f1f5f9;color:#374151">Cancelar</button>
      <button onclick="mGuardarPwd('${email}','${id}')" class="m-action-btn m-btn-p">Asignar</button>
    </div></div>`;
    document.getElementById('m-content').innerHTML=form;
  };

  window.mGuardarPwd=async(email,escuelaId)=>{
    const pwd=document.getElementById('mf-pwd').value;
    const pwd2=document.getElementById('mf-pwd2').value;
    if(pwd!==pwd2){toast('Las contraseñas no coinciden','warning');return;}
    if(pwd.length<6){toast('Mínimo 6 caracteres','warning');return;}
    const btn=document.querySelector('[onclick*="mGuardarPwd"]');
    if(btn){btn.textContent='Guardando...';btn.disabled=true;}
    const appKey=`pwd_${Date.now()}`;
    let appTemp=null;
    try{
      appTemp=firebase.initializeApp(firebaseConfig,appKey);
      const authTemp=appTemp.auth();
      try{
        await authTemp.createUserWithEmailAndPassword(email,pwd);
        await db.collection('escuelas').doc(escuelaId).update({_pwdHint:pwd});
        toast('Contraseña asignada correctamente','success');
        mTab('escuelas');
      }catch(err){
        if(err.code==='auth/email-already-in-use'){
          const escSnap=await db.collection('escuelas').doc(escuelaId).get();
          const hint=escSnap.data()?._pwdHint||null;
          let cambiado=false;
          if(hint){
            try{
              const cred=await authTemp.signInWithEmailAndPassword(email,hint);
              await cred.user.updatePassword(pwd);
              cambiado=true;
            }catch(e2){console.warn('hint desactualizado',e2.code);}
          }
          await db.collection('escuelas').doc(escuelaId).update({_pwdHint:pwd});
          toast(cambiado?'Contraseña actualizada correctamente':'Contraseña guardada. Se aplicará en el próximo acceso.',cambiado?'success':'info');
          mTab('escuelas');
        }else{throw err;}
      }
    }catch(e){
      toast('Error: '+e.message,'error');
      if(btn){btn.textContent='Asignar';btn.disabled=false;}
    }finally{
      if(appTemp)try{await appTemp.delete();}catch(e){}
    }
  };

  window.mNuevoPrograma=()=>{
    const form=`<div class="m-card"><div class="m-section">Nuevo Programa</div>
    <div style="margin-bottom:.75rem"><label style="font-size:.8rem;font-weight:600;display:block;margin-bottom:.3rem">Nombre *</label><input id="mf-pnom" style="width:100%;padding:.65rem;border:1px solid #e2e8f0;border-radius:8px;font-family:inherit"></div>
    <div style="margin-bottom:.75rem"><label style="font-size:.8rem;font-weight:600;display:block;margin-bottom:.3rem">Fecha Límite *</label><input id="mf-pfecha" type="date" style="width:100%;padding:.65rem;border:1px solid #e2e8f0;border-radius:8px;font-family:inherit"></div>
    <div style="margin-bottom:.75rem"><label style="font-size:.8rem;font-weight:600;display:block;margin-bottom:.3rem">Documentos requeridos</label>
    <div style="display:flex;gap:.5rem;margin-bottom:.5rem"><input id="mf-pdoc" placeholder="Nombre del documento" style="flex:1;padding:.65rem;border:1px solid #e2e8f0;border-radius:8px;font-family:inherit">
    <button onclick="mAgregarDoc()" style="padding:.65rem 1rem;border-radius:8px;border:none;background:#3b82f6;color:#fff;cursor:pointer;font-family:inherit">+</button></div>
    <div id="mf-pdocs"></div></div>
    <div style="display:flex;gap:.5rem">
      <button onclick="mTab('programas')" class="m-action-btn" style="background:#f1f5f9;color:#374151">Cancelar</button>
      <button onclick="mGuardarPrograma()" class="m-action-btn m-btn-p">Guardar</button>
    </div></div>`;
    document.getElementById('m-content').innerHTML=form;
    window._docs=[];
  };

  window.mRenderDocs=()=>{
    const el=document.getElementById('mf-pdocs');
    if(!el)return;
    el.innerHTML=(window._docs||[]).map((d,i)=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:.4rem .6rem;background:#f1f5f9;border-radius:6px;margin-bottom:.3rem;font-size:.8rem">${d}<button onclick="window._docs.splice(${i},1);mRenderDocs()" style="border:none;background:none;color:#ef4444;cursor:pointer;font-size:1rem;line-height:1">×</button></div>`).join('');
  };
  window.mAgregarDoc=()=>{
    const inp=document.getElementById('mf-pdoc');
    if(!inp||!inp.value.trim())return;
    if(!window._docs)window._docs=[];
    window._docs.push(inp.value.trim());
    inp.value='';
    mRenderDocs();
  };

  window.mGuardarPrograma=async()=>{
    const nombre=document.getElementById('mf-pnom').value.trim();
    const fecha=document.getElementById('mf-pfecha').value;
    if(!nombre||!fecha||!window._docs.length){toast('Completa todos los campos y agrega al menos un documento','warning');return;}
    const data={nombre,fechaLimite:fecha,documentosRequeridos:window._docs,todasEscuelas:true,escuelasAsignadas:[]};
    try{const ref=await db.collection('programas').add(data);estado.programas.push({id:ref.id,...data});mTab('programas');}
    catch(e){toast('Error al guardar','error');}
  };

  window.mEditarPrograma=id=>{
    const p=estado.programas.find(x=>x.id===id);
    if(!p)return;
    const form=`<div class="m-card"><div class="m-section">Editar Programa</div>
    <div style="margin-bottom:.75rem"><label style="font-size:.8rem;font-weight:600;display:block;margin-bottom:.3rem">Nombre *</label><input id="mf-pnom" value="${p.nombre}" style="width:100%;padding:.65rem;border:1px solid #e2e8f0;border-radius:8px;font-family:inherit"></div>
    <div style="margin-bottom:.75rem"><label style="font-size:.8rem;font-weight:600;display:block;margin-bottom:.3rem">Fecha Límite *</label><input id="mf-pfecha" type="date" value="${p.fechaLimite}" style="width:100%;padding:.65rem;border:1px solid #e2e8f0;border-radius:8px;font-family:inherit"></div>
    <div style="margin-bottom:.75rem"><label style="font-size:.8rem;font-weight:600;display:block;margin-bottom:.3rem">Documentos requeridos</label>
    <div style="display:flex;gap:.5rem;margin-bottom:.5rem"><input id="mf-pdoc" placeholder="Agregar documento" style="flex:1;padding:.65rem;border:1px solid #e2e8f0;border-radius:8px;font-family:inherit">
    <button onclick="mAgregarDoc()" style="padding:.65rem 1rem;border-radius:8px;border:none;background:#3b82f6;color:#fff;cursor:pointer;font-family:inherit">+</button></div>
    <div id="mf-pdocs"></div></div>
    <div style="display:flex;gap:.5rem">
      <button onclick="mTab('programas')" class="m-action-btn" style="background:#f1f5f9;color:#374151">Cancelar</button>
      <button onclick="mActualizarPrograma('${id}')" class="m-action-btn m-btn-p">Guardar</button>
    </div></div>`;
    document.getElementById('m-content').innerHTML=form;
    window._docs=[...p.documentosRequeridos];
    mRenderDocs();
  };

  window.mActualizarPrograma=async id=>{
    const nombre=document.getElementById('mf-pnom').value.trim();
    const fecha=document.getElementById('mf-pfecha').value;
    if(!nombre||!fecha||!window._docs.length){toast('Completa todos los campos','warning');return;}
    const p=estado.programas.find(x=>x.id===id);
    const data={...p,nombre,fechaLimite:fecha,documentosRequeridos:window._docs};
    try{await db.collection('programas').doc(id).update(data);estado.programas=estado.programas.map(x=>x.id===id?data:x);mTab('programas');}
    catch(e){toast('Error al guardar','error');}
  };

  window.mNuevoCompartido=()=>{
    const progsOpts=`<option value="">Sin programa específico</option>`+
      estado.programas.map(p=>`<option value="${p.id}">${p.nombre}</option>`).join('');
    const form=`<div class="m-card"><div class="m-section">Subir Archivo Compartido</div>
    <div style="margin-bottom:.75rem"><label style="font-size:.8rem;font-weight:600;display:block;margin-bottom:.3rem">Nombre *</label><input id="mf-cnom" style="width:100%;padding:.65rem;border:1px solid #e2e8f0;border-radius:8px;font-family:inherit"></div>
    <div style="margin-bottom:.75rem"><label style="font-size:.8rem;font-weight:600;display:block;margin-bottom:.3rem">Descripción</label><textarea id="mf-cdesc" style="width:100%;padding:.65rem;border:1px solid #e2e8f0;border-radius:8px;font-family:inherit" rows="2"></textarea></div>
    <div style="margin-bottom:.75rem"><label style="font-size:.8rem;font-weight:600;display:block;margin-bottom:.3rem">📋 Programa (opcional)</label>
    <select id="mf-cprog" style="width:100%;padding:.65rem;border:1px solid #e2e8f0;border-radius:8px;font-family:inherit;font-size:.875rem">${progsOpts}</select></div>
    <div style="margin-bottom:.75rem"><label style="font-size:.8rem;font-weight:600;display:block;margin-bottom:.3rem">Archivo *</label><input id="mf-cfile" type="file" style="width:100%;padding:.65rem;border:1px solid #e2e8f0;border-radius:8px;font-family:inherit"></div>
    <div style="display:flex;gap:.5rem">
      <button onclick="mTab('compartidos')" class="m-action-btn" style="background:#f1f5f9;color:#374151">Cancelar</button>
      <button onclick="mGuardarCompartido()" id="mf-cbtn" class="m-action-btn m-btn-p">Subir</button>
    </div></div>`;
    document.getElementById('m-content').innerHTML=form;
  };

  window.mGuardarCompartido=async()=>{
    const nombre=document.getElementById('mf-cnom').value.trim();
    const file=document.getElementById('mf-cfile').files[0];
    if(!nombre||!file){toast('Completa todos los campos','warning');return;}
    if(file.size>5*1024*1024){toast('El archivo supera 3 MB','error');return;}
    const btn=document.getElementById('mf-cbtn');
    btn.textContent='Subiendo...';btn.disabled=true;
    try{
      const ref=storage.ref(`compartidos/${Date.now()}_${file.name}`);
      await ref.put(file);
      const url=await ref.getDownloadURL();
      const progId=document.getElementById('mf-cprog')?.value||'';
      const tipo=getTipoMovil(file.name);
      const data={nombre,descripcion:document.getElementById('mf-cdesc').value,programaId:progId,url,tipo,fecha:new Date().toISOString()};
      const r=await db.collection('compartidos').add(data);
      estado.compartidos.push({id:r.id,...data});
      toast('Archivo compartido subido','success');
      mTab('compartidos');
    }catch(e){toast('Error al subir el archivo','error');btn.textContent='Subir';btn.disabled=false;}
  };
}
  </script>
